  html,body{margin:0;padding:0;background:#16281c;font-family:sans-serif;

  .db:active{background:#527a52;}
  #ab{display:flex;gap:12px;align-items:center;}
  .ab{width:52px;height:52px;border-radius:50%;background:#7a2c2c;color:#ffd9d9;
    border:2px solid #a85252;font-size:18px;font-weight:bold;touch-action:none;}
  .ab:active{background:#a85252;}
  #startb{background:#2c452c;color:#9fe3a0;border:2px solid #527a52;border-radius:12px;
    padding:7px 12px;font-size:11px;letter-spacing:1px;touch-action:none;}
  #startb:active{background:#527a52;}
  #hint{color:#5e8e5e;font-size:9px;margin:0 0 2px;text-align:center;line-height:1.3;padding:0 8px;}
  button{outline:none;-webkit-tap-highlight-color:transparent;}
  #ovl{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:none;
    align-items:center;justify-content:center;z-index:10;}
  #ovl .panel{background:#f4f0e2;border:4px solid #385078;border-radius:8px;
    width:min(92vw,420px);padding:16px;box-sizing:border-box;}
  #ovl h3{margin:0 0 10px;color:#385078;font-size:16px;}
  #ovlText{width:100%;height:110px;box-sizing:border-box;font-size:12px;
    font-family:monospace;border:2px solid #8aa0c0;border-radius:4px;padding:6px;background:#fff;}
  #ovl .row{display:flex;gap:10px;margin-top:12px;justify-content:flex-end;}
  #ovl button{padding:9px 18px;border-radius:6px;border:2px solid #385078;
    background:#dce8f8;color:#283850;font-size:14px;}
  #ovl button:active{background:#aac4e8;}
  #ovlNote{font-size:12px;color:#666;margin-top:8px;line-height:1.5;}
  /* === iPhone等の横持ち: ボタンを左右の外側に出して画面を最大化 === */
  @media (orientation:landscape) and (max-height:600px){
    #wrap{justify-content:center;padding-top:0;}
    h1,#hint{display:none;}
    #game{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);height:min(100svh, calc((100vw - 300px) / 1.5));width:auto;max-width:none;margin:0;}
    #pad{position:fixed;inset:0;width:100vw;height:100svh;max-height:none;min-height:0;
      padding:0;margin:0;background:none;pointer-events:none;display:block;}
    #pad>*{position:fixed;pointer-events:auto;}
    #dpad{left:16px;bottom:18px;}
    #ab{right:20px;bottom:22px;}
    #startb{right:24px;bottom:96px;left:auto;top:auto;transform:none;}
  }
</style>
</head>
<body>
<div id="wrap">
  <h1>OGUMON LEGEND</h1>
  <canvas id="game" width="480" height="320"></canvas>
  <div id="pad">

      <button class="db" data-k="up" style="grid-area:u">▲</button>
      <button class="db" data-k="left" style="grid-area:l">◀</button>
      <button class="db" data-k="right" style="grid-area:r">▶</button>
      <button class="db" data-k="down" style="grid-area:d">▼</button>
    </div>
    <button id="startb" data-k="start">START</button>
    <div id="ab">
      <button class="ab" data-k="b">B</button>
      <button class="ab" data-k="a">A</button>
    </div>
  </div>
  <div id="hint">矢印=移動 / B押しながら=ダッシュ / Z=決定・しらべる / X=もどる / Enter=メニュー</div>
</div>
<div id="ovl"><div class="panel">
  <h3 id="ovlTitle">レポート</h3>
  <textarea id="ovlText" spellcheck="false"></textarea>
  <div id="ovlNote"></div>
  <div class="row">
    <button id="ovlCopy">コピー</button>
    <button id="ovlOk">けってい</button>
    <button id="ovlClose">とじる</button>
  </div>
</div></div>

  for(let j=0;j<16;j++){const row=s.r[j]||'';

}

function drawImgSpr(key,x,y,sc,flip){
  const im=IMG[key];if(!im||!im.complete||!im.naturalWidth)return false;
  const s=16*sc;
  ctx.save();
  if(flip){ctx.translate(x+s,y);ctx.scale(-1,1);}else{ctx.translate(x,y);}
  ctx.drawImage(im,0,0,s,s);
  ctx.restore();
  return true;
}
function drawEgg(x,y,sc){
  const cx=x+sc*8,cy=y+sc*9;

  ctx.fillStyle='#f6efd8';ctx.strokeStyle='#c8a868';ctx.lineWidth=Math.max(2,sc);
  ctx.beginPath();ctx.ellipse(cx,cy,sc*7,sc*9,0,0,7);ctx.fill();ctx.stroke();
  ctx.fillStyle='#8ec07c';
  ctx.beginPath();ctx.ellipse(cx-sc*2,cy-sc*2,sc*1.7,sc*1.7,0,0,7);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx+sc*3,cy+sc*2,sc*1.3,sc*1.3,0,0,7);ctx.fill();
  ctx.beginPath();ctx.ellipse(cx-sc,cy+sc*3,sc,sc,0,0,7);ctx.fill();
  ctx.restore();
}
function drawMon(m,x,y,sc,flip){
  if(m&&m.isEgg){drawEgg(x,y,sc);return;}
  const sp=SPECIES[m.id];
  if(sp.img&&drawImgSpr(sp.img,x,y,sc,flip))return;
  drawMon32(sp.spr,x,y,sc,flip,sp.pal||null);

function baseFormOf(id){

function eggPool(){

  const evoTargets=new Set(Object.keys(SPECIES).map(k=>SPECIES[k].evo&&SPECIES[k].evo.to).filter(Boolean));
  return Object.keys(SPECIES).filter(id=>SPECIES[id].img&&!evoTargets.has(id));
}
function makeEgg(parentId){

const SPECIAL_TYPES=new Set(['ほのお','みず','くさ','でんき','エスパー','こおり','ドラゴン','あく','フェアリー']);
function baseSatk(b,type){return b.satk!==undefined?b.satk:(SPECIAL_TYPES.has(type)?b.atk:Math.round(b.atk*0.6));}
function baseSdef(b,type){return b.sdef!==undefined?b.sdef:Math.round(b.def*0.9+5);}
function recompute(m,full){
  const b=SPECIES[m.id].base;
  const iv=m.iv||(m.iv={hp:0,atk:0,def:0,spd:0});
  const ev=m.ev||(m.ev={hp:0,atk:0,def:0,spd:0});
  const nat=NATURES[m.nat||0]||NATURES[0];
  const dmg=full?0:Math.max(0,m.maxhp-m.hp);
  m.maxhp=Math.floor((2*b.hp+iv.hp+Math.floor(ev.hp/4))*m.lv/100)+m.lv+10;
  const calc=(base,ivv,evv,key)=>{
    let s=Math.floor((2*base+ivv+Math.floor(evv/4))*m.lv/100)+5;
    if(nat.up===key)s=Math.floor(s*1.1);

    return s;
  };
  const _ty=SPECIES[m.id].type,_bsa=baseSatk(b,_ty),_bsd=baseSdef(b,_ty);
  m.stats={atk:calc(b.atk,iv.atk,ev.atk,'atk'),
           def:calc(b.def,iv.def,ev.def,'def'),
           spd:calc(b.spd,iv.spd,ev.spd,'spd'),
           satk:calc(_bsa,iv.satk||0,ev.satk||0,'satk'),
           sdef:calc(_bsd,iv.sdef||0,ev.sdef||0,'sdef')};
  m.hp=full?m.maxhp:Math.max(1,m.maxhp-dmg);
  m.dhp=m.hp;
}

function gainEV(m,foe){
  if(!m.ev)m.ev={hp:0,atk:0,def:0,spd:0,satk:0,sdef:0};
  ['hp','atk','def','spd','satk','sdef'].forEach(k=>{if(m.ev[k]===undefined)m.ev[k]=0;});
  const tot=m.ev.hp+m.ev.atk+m.ev.def+m.ev.spd+m.ev.satk+m.ev.sdef;
  if(tot>=510)return;
  const b=SPECIES[foe.id].base,ty=SPECIES[foe.id].type;
  const vals={hp:b.hp,atk:b.atk,def:b.def,spd:b.spd,satk:baseSatk(b,ty),sdef:baseSdef(b,ty)};
  let best='hp';for(const k in vals)if(vals[k]>vals[best])best=k;
  let y=(SPECIES[foe.id].evo?1:2)+(foe.lv>=30?1:0);   /* 1〜3 */
  y=Math.min(y,252-m.ev[best],510-tot);
  if(y>0)m.ev[best]+=y;
}

    g:id==='EMERODO'?'':(Math.random()<0.5?'♂':'♀')};
  recompute(m,true);
  m.dexp=m.exp;
  m.moves=mvNames?mvNames.map(n=>({name:n,pp:MOVES[n].pp,maxpp:MOVES[n].pp})):movesFor(id,lv);
  m.dhp=m.hp;

const stg=s=>s>=0?(2+s)/2:2/(2-s);

function bgmSchedule(){

  const d=BGM_DATA[BGM.track];if(!d)return;

  let at=BGM.ctx.currentTime+0.06,total=0;

}
function playBGM(track){
  if(BGM.timer){clearTimeout(BGM.timer);BGM.timer=null;}

}

<script>
/* ================= ゲーム状態 ================= */
const G={mode:'title',busy:false,msg:null,choice:null,bmenu:null,battle:null,
  starterIdx:0,vsText:'',vsPicked:[[],[]],time:0,gender:'boy',pname:'ユウキ',
  map:'MIDORI',player:{x:11,y:7,px:11*TILE,py:7*TILE,dir:'down',moving:false,t:0,tx:11,ty:7},
  party:[],box:[],items:{ball:0,potion:0,spotion:0,superball:0,hyperball:0,cure:0,revive:0,ppaid:0,tm_thunder:0,tm_surf:0,tm_fire:0,tm_psy:0,tm_ice:0,tm_sword:0},$:0,bg:0,fl:{df:{}},daycare:[],eggWalk:0,
  ct:[],sn:[]};
const DIRS={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
const curMap=()=>MAPS[G.map];
function tile(x,y){const m=curMap();if(y<0||y>=m.rows.length||x<0||x>=m.rows[0].length)return m.pad;return m.rows[y][x];}
function npcsHere(){return NPCS.filter(n=>n.map===G.map&&(!n.cond||n.cond()));}
function npcAt(x,y){return npcsHere().find(n=>n.x===x&&n.y===y);}
function walkable(x,y){return WALK.includes(tile(x,y))&&!npcAt(x,y);}
function seen(id){if(!G.sn.includes(id))G.sn.push(id);}
function caught(id){seen(id);if(!G.ct.includes(id))G.ct.push(id);}
/* ================= 入力 ================= */
let waiting=null;const held={};
const ovl=document.getElementById('ovl');
function waitKey(valid){return new Promise(res=>{waiting={valid,res};});}
function press(k){
  if(ovl.style.display==='flex')return;
  bgmResume();
  if(waiting&&waiting.valid.includes(k)){const w=waiting;waiting=null;w.res(k);return;}
  if(k==='start'&&G.mode==='overworld'&&!G.busy&&!G.msg&&!G.choice)openMenu();
}
const KEYMAP={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',
  z:'a',Z:'a',x:'b',X:'b',Enter:'start'};
addEventListener('keydown',e=>{
  if(ovl.style.display==='flex')return;
  const k=KEYMAP[e.key];if(!k)return;e.preventDefault();
  if(!e.repeat)press(k);held[k]=true;});
addEventListener('keyup',e=>{const k=KEYMAP[e.key];if(k)held[k]=false;});
const _ptrKey={};
document.querySelectorAll('[data-k]').forEach(b=>{
  const k=b.dataset.k;
  b.addEventListener('pointerdown',e=>{e.preventDefault();bgmResume();press(k);held[k]=true;
    _ptrKey[e.pointerId]=k;try{b.setPointerCapture(e.pointerId);}catch(_){}});
  const rel=e=>{held[k]=false;delete _ptrKey[e.pointerId];};
  ['pointerup','pointercancel'].forEach(ev=>b.addEventListener(ev,rel));
});
/* 取りこぼし対策: ボタンの外で指を離しても その方向を必ず解除する */
['pointerup','pointercancel'].forEach(ev=>addEventListener(ev,e=>{
  const k=_ptrKey[e.pointerId];if(k!==undefined){held[k]=false;delete _ptrKey[e.pointerId];}
}));
/* タブ非表示・フォーカス喪失で 押しっぱなし状態を全解除(フリーズ防止) */
function clearHeld(){for(const kk in held)held[kk]=false;for(const id in _ptrKey)delete _ptrKey[id];}
addEventListener('blur',clearHeld);
document.addEventListener('visibilitychange',()=>{if(document.hidden)clearHeld();});
/* ================= UIヘルパー ================= */
const MSG_LINECH=22;
function msgLines(t,n){n=n||MSG_LINECH;t=String(t);const o=[];let i=0;while(i<t.length){o.push(t.slice(i,i+n));i+=n;}return o.length?o:[''];}
function msgPages(t){const L=msgLines(t);const p=[];for(let i=0;i<L.length;i+=2)p.push(L.slice(i,i+2).join('\n'));return p.length?p:[''];}
async function say(t){
  const pages=msgPages(t);
  G.msg={pages,pi:0,t:pages[0],n:0};
  while(true){
    await waitKey(['a','b']);
    if(G.msg.n<G.msg.t.length){G.msg.n=G.msg.t.length;continue;}
    if(G.msg.pi<pages.length-1){G.msg.pi++;G.msg.t=pages[G.msg.pi];G.msg.n=0;continue;}
    break;
  }
  G.msg=null;
}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
async function choice(items,opt){
  opt=opt||{};
  const c={items,index:opt.index||0,title:opt.title||''};G.choice=c;
  try{
    while(true){
      const k=await waitKey(['up','down','a','b']);
      if(k==='up')c.index=(c.index+items.length-1)%items.length;
      else if(k==='down')c.index=(c.index+1)%items.length;
      else if(k==='a')return c.index;
      else if(k==='b'){
        if(opt.bIndex!==undefined){c.index=opt.bIndex;return opt.bIndex;}
        if(opt.cancel!==false)return -1;
      }
    }
  }finally{G.choice=null;}
}
async function confirmAsk(t){G.msg={t:String(t),n:t.length};const i=await choice(['はい','いいえ'],{cancel:false,bIndex:1});G.msg=null;return i===0;}
async function gridMenu(items,label){
  const m={items,index:0,grid:true,label};G.bmenu=m;
  try{
    while(true){
      const k=await waitKey(['up','down','left','right','a','b']);
      if(k==='left'||k==='right')m.index^=1;
      else if(k==='up'||k==='down')m.index^=2;
      else if(k==='a')return m.index;
      else if(k==='b')return -1;
    }
  }finally{G.bmenu=null;}
}
async function movesMenu(mon){
  const items=mon.moves.map(v=>v.name);while(items.length<4)items.push('---');
  let si=mon._lm||0;if(si>=mon.moves.length)si=0;
  const m={items,index:si,grid:true,moves:mon.moves};G.bmenu=m;
  try{
    while(true){
      const k=await waitKey(['up','down','left','right','a','b']);
      if(k==='left'||k==='right')m.index^=1;
      else if(k==='up'||k==='down')m.index^=2;
      else if(k==='a'){if(m.index<mon.moves.length){mon._lm=m.index;return m.index;}}
      else if(k==='b')return -1;
    }
  }finally{G.bmenu=null;}
}
function monLabel(m){
  return m.name+' Lv'+m.lv+' HP'+m.hp+'/'+m.maxhp+(m.status||m.cfn?'['+(m.status?({PAR:'まひ',PSN:'どく',BRN:'やけど',SLP:'ねむり',FRZ:'こおり'}[m.status]):'こんらん')+']':'')+(m.hp<=0?'[ひんし]':'');
}
async function partyChoice(title,team,filter,failMsg){
  if(!team.length)return null;
  const pk={team,index:0,title:title||'モンスターを えらんでください'};
  G.pick=pk;
  try{
    while(true){
      const k=await waitKey(['up','down','left','right','a','b']);
      if(k==='up')pk.index=(pk.index+team.length-1)%team.length;
      else if(k==='down')pk.index=(pk.index+1)%team.length;
      else if(k==='left'||k==='right'){if(team.length>1)pk.index=pk.index===0?1:0;}
      else if(k==='a'){
        const m=team[pk.index];
        if(filter&&!filter(m)){await say(failMsg||'それは えらべない!');continue;}
        return m;
      }else if(k==='b')return null;
    }
  }finally{G.pick=null;}
}
/* ================= バトルエンジン ================= */
function calcDmg(att,def,base){
  const eff=effOf(base.t,SPECIES[def.id].type);
  const stab=base.t===SPECIES[att.id].type?1.5:1;
  /* 物理/特殊: わざに cat指定が あれば それ、なければ タイプで判定(エメラルド方式) */
  const special=base.cat?base.cat==='spec':SPECIAL_TYPES.has(base.t);
  let a,d;
  if(special){
    a=att.stats.satk*stg(att.st.satk||0);
    d=Math.max(1,def.stats.sdef*stg(def.st.sdef||0));
  }else{
    let atkMul=stg(att.st.atk);
    if(att.status==='BRN')atkMul*=0.5;          /* やけどは ぶつりこうげきを 半減 */
    a=att.stats.atk*atkMul;
    d=Math.max(1,def.stats.def*stg(def.st.def));
  }
  const crit=Math.random()<1/16;                /* きゅうしょ */
  let dmg=Math.floor((Math.floor(2*att.lv/5+2)*base.pow*a/d)/50)+2;
  dmg=Math.max(1,Math.floor(dmg*stab*eff*(crit?1.5:1)*(0.85+Math.random()*0.15)));
  return{dmg,eff,crit,special};
}
function hpAnim(m){
  return new Promise(r=>{
    if(!isFinite(m.maxhp)||m.maxhp<=0)m.maxhp=1;
    if(!isFinite(m.hp))m.hp=0;
    if(m.dhp===undefined||!isFinite(m.dhp))m.dhp=m.hp;
    let ticks=0;
    const iv=setInterval(()=>{
      ticks++;
      const d=m.hp-m.dhp;
      if(Math.abs(d)<0.9||ticks>100||!isFinite(d)){m.dhp=m.hp;clearInterval(iv);r();}
      else m.dhp+=Math.sign(d)*Math.max(0.7,m.maxhp/45);
    },30);
  });
}
async function fxAnim(side,type){
  if(!G.battle)return;
  G.battle.fx={side,type,t0:performance.now()};
  await sleep(type==='lunge'?230:380);
  if(G.battle)G.battle.fx=null;
}
function sideOf(m){return G.battle&&m===G.battle.ally?'ally':'enemy';}
async function attack(att,def,mv){
  const base=MOVES[mv.name];
  if(mv.pp!==undefined&&base.pp<900)mv.pp=Math.max(0,mv.pp-1);
  await say(att.name+'の '+mv.name+'!');
  if(base.splash){await say('しかし なにも おこらない!');return;}
  if(Math.random()*100>=base.acc){await say('しかし こうげきは はずれた!');return;}
  if(base.pow>0){
    await fxAnim(sideOf(att),'lunge');
    const r=calcDmg(att,def,base);
    def.hp=Math.max(0,def.hp-(isFinite(r.dmg)?r.dmg:0));if(!isFinite(def.hp))def.hp=0;
    await fxAnim(sideOf(def),'hit');
    await hpAnim(def);
    if(r.crit)await say('きゅうしょに あたった!');
    if(r.eff>1)await say('こうかは ばつぐんだ!');
    else if(r.eff<1)await say('こうかは いまひとつのようだ…');
    if(base.drain&&r.dmg>0){
      att.hp=Math.min(att.maxhp,att.hp+Math.ceil(r.dmg*base.drain));
      await hpAnim(att);
      await say(def.name+'から たいりょくを すいとった!');
    }
  }
  if(base.stat&&def.hp>0){
    for(const k in base.stat)def.st[k]=Math.max(-6,Math.min(6,def.st[k]+base.stat[k]));
    const nm={atk:'こうげき',def:'ぼうぎょ',spd:'すばやさ'};
    const key=Object.keys(base.stat)[0];
    await say(def.name+'の '+nm[key]+'が '+(base.stat[key]<=-2?'がくっと ':'')+'さがった!');
  }
  if(base.self){
    const nm={atk:'こうげき',def:'ぼうぎょ',spd:'すばやさ'};
    for(const k in base.self)att.st[k]=Math.max(-6,Math.min(6,att.st[k]+base.self[k]));
    const key=Object.keys(base.self)[0],v=base.self[key];
    await say(att.name+'の '+nm[key]+'が '+(Math.abs(v)>=2?'ぐーんと ':'')+(v>0?'あがった!':'さがった!'));
  }
  if(base.fx&&def.hp>0&&Math.random()*100<base.fx.c){
    const s=base.fx.s;
    if(s==='CFN'){
      if(!def.cfn){def.cfn=rand(2,4);await say(def.name+'は こんらんした!');}
    }else if(!def.status){
      def.status=s;
      if(s==='SLP')def.slp=rand(2,4);
      const msg={PAR:'まひして わざが でにくくなった!',PSN:'どくを あびた!',
        BRN:'やけどを おった!',SLP:'ねむって しまった!',FRZ:'こおりついた!'}[s];
      await say(def.name+'は '+msg);
    }
  }
}
function pickAI(m,foe){
  const us=m.moves.filter(v=>v.pp>0);
  if(!us.length)return{name:'わるあがき',pp:1,maxpp:1};
  if(foe&&Math.random()<0.7){
    let best=us[0],bs=-1;
    for(const v of us){
      const b=MOVES[v.name];
      const s=(b.pow||0)*effOf(b.t,SPECIES[foe.id].type)*(b.t===SPECIES[m.id].type?1.5:1);
      if(s>bs){bs=s;best=v;}
    }
    return best;
  }
  return us[rand(0,us.length-1)];
}
function orderActs(acts){
  return acts.sort((p,q)=>{
    const pp=(MOVES[p.mv.name].pri||0),qp=(MOVES[q.mv.name].pri||0);
    if(pp!==qp)return qp-pp;
    const ds=effSpd(q.att)-effSpd(p.att);
    if(ds!==0)return ds;
    return Math.random()-0.5;
  });
}
async function performAct(b,act){
  const att=act.att;if(att.hp<=0)return;
  if(att.status==='FRZ'){
    if(Math.random()<0.2){att.status=null;await say(att.name+'の こおりが とけた!');}
    else{await say(att.name+'は こおって うごけない!');return;}
  }
  if(att.status==='SLP'){
    att.slp=(att.slp||1)-1;
    if(att.slp<=0){att.status=null;await say(att.name+'は めを さました!');}
    else{await say(att.name+'は ぐうぐう ねむっている…');return;}
  }
  if(att.status==='PAR'&&Math.random()<0.25){
    await say(att.name+'は からだが しびれて うごけない!');return;
  }
  if(att.cfn>0){
    att.cfn--;
    if(att.cfn<=0){await say(att.name+'の こんらんが とけた!');}
    else{
      await say(att.name+'は こんらんしている!');
      if(Math.random()<0.33){
        const self=Math.max(1,Math.floor((Math.floor(2*att.lv/5+2)*40*att.stats.atk/Math.max(1,att.stats.def))/50)+2);
        att.hp=Math.max(0,att.hp-self);
        await fxAnim(sideOf(att),'hit');await hpAnim(att);
        await say('わけも わからず じぶんを こうげきした!');return;
      }
    }
  }
  const def=act.defGet();
  if(def.hp<=0)return;
  await attack(att,def,act.mv);
}
async function poisonTick(m){
  if(m.hp<=0)return;
  if(m.status==='PSN'){
    m.hp=Math.max(0,m.hp-Math.max(1,Math.floor(m.maxhp/8)));
    await say(m.name+'は どくの ダメージを うけている!');
    await hpAnim(m);
  }else if(m.status==='BRN'){
    m.hp=Math.max(0,m.hp-Math.max(1,Math.floor(m.maxhp/8)));
    await say(m.name+'は やけどの ダメージを うけている!');
    await hpAnim(m);
  }
}
async function teachMove(m,name){
  if(m.moves.some(v=>v.name===name)){await say(m.name+'は すでに '+name+'を おぼえている!');return false;}
  const nm={name,pp:MOVES[name].pp,maxpp:MOVES[name].pp};
  if(m.moves.length<4){m.moves.push(nm);await say(m.name+'は '+name+'を おぼえた!');return true;}
  await say(m.name+'は あたらしく '+name+'を おぼえたい!');
  await say('でも わざは 4つまで。どれかを わすれさせる?');
  const ci=await forgetMoveUI(m,name);
  if(ci<0){await say('… '+name+'を おぼえるのを あきらめた。');return false;}
  const old=m.moves[ci];m.moves[ci]=nm;
  await say('1、2、 ポカン! '+old.name+'を わすれて '+name+'を おぼえた!');
  return true;
}
async function learnMovesAt(m,lv){
  for(const e of SPECIES[m.id].learn){
    if(e[0]===lv&&!m.moves.some(v=>v.name===e[1]))await teachMove(m,e[1]);
  }
}
function expBarAnim(m,target){
  return new Promise(res=>{
    if(m.dexp===undefined||!isFinite(m.dexp))m.dexp=m.exp;
    if(!isFinite(target)){m.dexp=m.exp;return res();}
    const span=Math.max(1,(m.lv+1)**3-m.lv**3);
    const dist=Math.max(1,target-m.dexp);
    /* だいたい0.6〜1.0秒かけて伸ばす(30msステップ) */
    const steps=Math.min(40,Math.max(20,Math.round(dist/span*40)))||30;
    const speed=dist/steps;
    let ticks=0;
    const iv=setInterval(()=>{
      ticks++;
      if(m.dexp>=target-0.5||ticks>100||!isFinite(m.dexp)){m.dexp=target;clearInterval(iv);res();}
      else m.dexp=Math.min(target,m.dexp+speed);
    },30);
  });
}
async function gainExp(m,foe,mult){
  gainEV(m,foe);recompute(m,false);
  const g=Math.floor(SPECIES[foe.id].bexp*foe.lv/7*(mult||1))+3;
  await say(m.name+'は '+g+'けいけんちを もらった!');
  let remain=g;
  while(remain>0){
    const need=(m.lv+1)**3-m.exp;
    if(m.lv<60&&remain>=need){
      /* このレベルぶんを使い切ってバーを満タンに */
      m.exp+=need;remain-=need;
      await expBarAnim(m,(m.lv+1)**3);
      m.lv++;recompute(m,false);
      m.nawa=Math.min(255,(m.nawa||70)+3);   /* なつき度アップ */
      m.dexp=m.lv**3;            /* 次レベルのバーは左端から */
      await say(m.name+'は レベル'+m.lv+'に あがった!');
      await sleep(120);
      await learnMovesAt(m,m.lv);
      const ev=SPECIES[m.id].evo;
      if(ev&&m.lv>=ev.lv){
        await say('おや…!? '+m.name+'の ようすが…!');
        m.id=ev.to;m.name=SPECIES[ev.to].name;recompute(m,false);
        caught(m.id);
        await say('おめでとう! '+m.name+'に しんかした!');
        await learnMovesAt(m,m.lv);
      }
      if(m.lv>=60){m.exp+=remain;remain=0;m.dexp=m.exp;}
    }else{
      m.exp+=remain;
      await expBarAnim(m,m.exp);
      remain=0;
    }
  }
  await sleep(650);  /* 満タンになったバーを ひと呼吸 見せる */
}
function endStg(){G.party.forEach(m=>{m.st={atk:0,def:0,spd:0,satk:0,sdef:0};m.cfn=0;});}
const WAKEPOINTS={MIDORI:[3,10],KUSAKI:[9,9],HONOO:[10,9],MINATO:[3,14],RAIDEN:[12,8],HOSHI:[6,8],IWACITY:[6,8],SORA:[11,9],MORI:[11,9]};
async function blackout(){
  await say('めのまえが まっくらに なった!');
  G.$=Math.floor(G.$/2);
  const town=WAKEPOINTS[G.lastTown]?G.lastTown:'MIDORI';
  const w=WAKEPOINTS[town];
  /* さきに バトル画面を けして 街へ てんそう(なぞの がめんを ふせぐ) */
  G.battle=null;G.fx=null;G.mode='overworld';if(typeof playBGM==='function')playBGM('overworld');
  warpTo(town,w[0],w[1]);
  G.player.dir='up';
  G.party.forEach(healFull);
  G.mapSign={name:curMap().name,t0:performance.now()};
  await say(curMap().name+'の ポケモンセンターで めを さました。');
  await say('モンスターたちは げんきに なった!');
}
async function allyFaintWild(b){
  await say(b.ally.name+'は たおれた!');
  const alive=G.party.filter(m=>m.hp>0);
  if(!alive.length){await blackout();return true;}
  const nm=await partyChoice('つぎは だれを だす?',G.party,m=>m.hp>0,'たたかえる じょうたいじゃない!');
  b.ally=nm;await say('いけ! '+nm.name+'!');
  return false;
}
async function checkFaintsWild(b){
  if(b.enemy.hp<=0&&!b.enemyDone){
    b.enemyDone=true;
    await say('やせいの '+b.enemy.name+'は たおれた!');
    await gainExp(b.ally,b.enemy,1);
    return 'win';
  }
  if(b.ally.hp<=0){if(await allyFaintWild(b))return 'lose';}
  return null;
}
async function battleMenu(b){
  while(true){
    const i=await gridMenu(['たたかう','バッグ','モンスター','にげる'],b.ally.name+'は どうする?');
    if(i===0){
      /* 全わざPP切れなら わるあがき */
      if(b.ally.moves.every(v=>v.pp<=0))return{type:'move',mv:{name:'わるあがき',pp:1,maxpp:1}};
      const mi=await movesMenu(b.ally);
      if(mi>=0){
        const mv=b.ally.moves[mi];
        if(mv.pp<=0){await say('わざの PPが のこっていない!');continue;}
        return{type:'move',mv};
      }
    }else if(i===1){
      const have=Object.keys(ITEMS).filter(k=>G.items[k]>0&&ITEMS[k].kind!=='tm'&&(ITEMS[k].kind!=='ball'||b.kind==='wild'));
      if(!have.length){await say('つかえる どうぐが ない!');continue;}
      const ii=await choice(have.map(k=>ITEMS[k].name+' ×'+G.items[k]),{title:'バッグ'});
      if(ii<0)continue;
      const key=have[ii],it=ITEMS[key];
      if(it.kind==='ball'){return{type:'ball',ball:key};}
      if(it.kind==='heal'){
        const t=await partyChoice('だれに つかう?',G.party,m=>m.hp>0&&m.hp<m.maxhp,'かいふくの ひつようが ない!');
        if(t)return{type:'item',key,mon:t};
      }else if(it.kind==='cure'){
        const t=await partyChoice('だれに つかう?',G.party,m=>m.hp>0&&(m.status||m.cfn),'なおす じょうたいの モンスターが いない!');
        if(t)return{type:'item',key,mon:t};
      }else if(it.kind==='revive'){
        const t=await partyChoice('だれに つかう?',G.party,m=>m.hp<=0,'ひんしの モンスターが いない!');
        if(t)return{type:'item',key,mon:t};
      }else if(it.kind==='pp'){
        const t=await partyChoice('だれに つかう?',G.party,m=>m.moves.some(v=>v.pp<v.maxpp),'PPが へっている モンスターが いない!');
        if(t){const mi=await choice(t.moves.map(v=>v.name+' '+v.pp+'/'+v.maxpp),{title:'どの わざを かいふく?'});
          if(mi>=0)return{type:'item',key,mon:t,move:t.moves[mi]};}
      }
    }else if(i===2){
      const t=await partyChoice('だれと いれかえる?',G.party,m=>m!==b.ally&&m.hp>0,'たたかえる じょうたいじゃない!');
      if(t)return{type:'switch',mon:t};
    }else if(i===3){
      if(b.kind!=='wild'){await say('トレーナーせんから にげられない!');continue;}
      return{type:'run'};
    }
  }
}
async function useItem(cmd){
  const it=ITEMS[cmd.key];G.items[cmd.key]--;
  const m=cmd.mon;
  if(it.kind==='heal'){
    m.hp=Math.min(m.maxhp,m.hp+it.heal);await hpAnim(m);
    await say(m.name+'の きずが かいふくした!');
  }else if(it.kind==='cure'){
    m.status=null;m.cfn=0;m.slp=0;
    await say(m.name+'の じょうたい いじょうが なおった!');
  }else if(it.kind==='revive'){
    m.hp=Math.ceil(m.maxhp/2);m.dhp=m.hp;m.status=null;m.cfn=0;m.slp=0;
    await hpAnim(m);await say(m.name+'は げんきを とりもどした!');
  }else if(it.kind==='pp'){
    cmd.move.pp=cmd.move.maxpp;
    await say(cmd.move.name+'の PPが かいふくした!');
  }
}
/* --- 野生バトル --- */
async function wildBattle(id,lv){
  G.busy=true;G.mode='battle';playBGM('battle');
  const enemy=makeMon(id,lv);seen(id);
  const b={kind:'wild',ally:G.party.find(m=>m.hp>0),enemy};
  G.battle=b;
  await say('あ! やせいの '+enemy.name+'が とびだしてきた!');
  await say('いけ! '+b.ally.name+'!');
  let result=null;
  loop:while(true){
    const cmd=await battleMenu(b);
    if(cmd.type==='run'){
      if(Math.random()<(effSpd(b.ally)>=effSpd(b.enemy)?1:0.6)){
        await say('うまく にげきれた!');break;
      }
      await say('にげられない!');
    }else if(cmd.type==='ball'){
      const ballKey=cmd.ball||'ball';const ball=ITEMS[ballKey];
      G.items[ballKey]--;
      await say(ball.name+'を なげた!');
      b.enemyHidden=true;
      await say('・・・ ・・・ ・・・');
      const rate=Math.min(0.97,(1-(b.enemy.hp/b.enemy.maxhp)*0.7)*(SPECIES[b.enemy.id].catch||0.5)*(b.enemy.status?1.5:1)*ball.rate);
      if(Math.random()<rate){
        await say('やったー! '+b.enemy.name+'を つかまえた!');
        caught(b.enemy.id);
        healFull(b.enemy);
        if(G.party.length<6){G.party.push(b.enemy);
          await say(b.enemy.name+'は なかまに なった!');}
        else if(G.box.length<100){G.box.push(b.enemy);
          await say('てもちが いっぱいなので '+b.enemy.name+'は ボックスに おくられた!');}
        else{await say('てもちも ボックスも いっぱいで '+b.enemy.name+'を にがした…');}
        if(b.enemy.id==='EMERODO')G.fl.emerald=true;
        break;
      }
      b.enemyHidden=false;
      await say('ああ! ボールから でてきてしまった!');
    }else if(cmd.type==='item'){
      await useItem(cmd);
    }else if(cmd.type==='switch'){
      b.ally=cmd.mon;await say('いけ! '+b.ally.name+'!');
    }else if(cmd.type==='move'){
      const acts=orderActs([
        {att:b.ally,defGet:()=>b.enemy,mv:cmd.mv},
        {att:b.enemy,defGet:()=>b.ally,mv:pickAI(b.enemy,b.ally)}]);
      for(const act of acts){
        await performAct(b,act);
        result=await checkFaintsWild(b);
        if(result)break loop;
      }
      await poisonTick(b.ally);await poisonTick(b.enemy);
      result=await checkFaintsWild(b);
      if(result)break loop;
      continue;
    }
    /* 行動を消費した場合は敵の攻撃 */
    if(b.enemy.hp>0){
      await performAct(b,{att:b.enemy,defGet:()=>b.ally,mv:pickAI(b.enemy,b.ally)});
      result=await checkFaintsWild(b);
      if(result)break loop;
      await poisonTick(b.ally);await poisonTick(b.enemy);
      result=await checkFaintsWild(b);
      if(result)break loop;
    }
  }
  endStg();
  if(b.enemy.id==='EMERODO'&&b.enemyDone&&!G.ct.includes('EMERODO')){
    G.fl.emerald=true;
    await say('エメロードは しずかに ねむりに ついた… (さいだんを しらべれば もういちど いどめる)');
  }
  G.battle=null;G.mode='overworld';G.busy=false;playBGM('overworld');
  autoSave();
}
/* --- トレーナーバトル --- */
async function trainerBattle(tr){
  G.busy=true;G.mode='battle';playBGM('battle');
  const teamDef=typeof tr.team==='function'?tr.team():tr.team;
  const eteam=teamDef.map(e=>makeMon(e[0],e[1]));
  const b={kind:'trainer',ally:G.party.find(m=>m.hp>0),enemy:eteam[0],eteam,ei:0,trname:tr.name};
  G.battle=b;seen(b.enemy.id);
  if(tr.intro)await say(tr.intro);
  await say(tr.name+'が しょうぶを しかけてきた!');
  await say(tr.name+'は '+b.enemy.name+'を くりだした!');
  await say('いけ! '+b.ally.name+'!');
  let won=false;
  loop:while(true){
    const cmd=await battleMenu(b);
    if(cmd.type==='item'){await useItem(cmd);}
    else if(cmd.type==='switch'){b.ally=cmd.mon;await say('いけ! '+b.ally.name+'!');}
    else if(cmd.type==='move'){
      const acts=orderActs([
        {att:b.ally,defGet:()=>b.enemy,mv:cmd.mv},
        {att:b.enemy,defGet:()=>b.ally,mv:pickAI(b.enemy,b.ally)}]);
      for(const act of acts){
        await performAct(b,act);
        const r=await checkFaintsTrainer(b);
        if(r==='win'){won=true;break loop;}
        if(r==='lose')break loop;
        if(r==='next')break;
      }
      await poisonTick(b.ally);await poisonTick(b.enemy);
      const r2=await checkFaintsTrainer(b);
      if(r2==='win'){won=true;break loop;}
      if(r2==='lose')break loop;
      continue;
    }
    if(b.enemy.hp>0){
      await performAct(b,{att:b.enemy,defGet:()=>b.ally,mv:pickAI(b.enemy,b.ally)});
      const r=await checkFaintsTrainer(b);
      if(r==='win'){won=true;break loop;}
      if(r==='lose')break loop;
      await poisonTick(b.ally);await poisonTick(b.enemy);
      const r2=await checkFaintsTrainer(b);
      if(r2==='win'){won=true;break loop;}
      if(r2==='lose')break loop;
    }
  }
  endStg();
  if(won){
    if(tr.lose)await say(tr.lose);
    await say(tr.name+'との しょうぶに かった! しょうきんで '+tr.prize+'円 てに いれた!');
    G.$+=tr.prize;
    if(tr.badge){G.bg=Math.max(G.bg,tr.badge);
      await say('ジムバッジを てに いれた! (バッジ '+G.bg+'こ)');}
    if(tr.flag)G.fl[tr.flag]=true;
  }
  G.battle=null;G.mode='overworld';G.busy=false;playBGM('overworld');
  autoSave();
  return won;
}
async function checkFaintsTrainer(b){
  if(b.enemy.hp<=0){
    await say(b.trname+'の '+b.enemy.name+'は たおれた!');
    await gainExp(b.ally,b.enemy,1.5);
    b.ei++;
    if(b.ei>=b.eteam.length)return 'win';
    b.enemy=b.eteam[b.ei];seen(b.enemy.id);
    await say(b.trname+'は '+b.enemy.name+'を くりだした!');
    return 'next';
  }
  if(b.ally.hp<=0){
    await say(b.ally.name+'は たおれた!');
    const alive=G.party.filter(m=>m.hp>0);
    if(!alive.length){await blackout();return 'lose';}
    const nm=await partyChoice('つぎは だれを だす?',G.party,m=>m.hp>0,'たたかえる じょうたいじゃない!');
    b.ally=nm;await say('いけ! '+nm.name+'!');
  }
  return null;
}
</script>

<script>
/* ================= フィールド ================= */
function warpTo(map,x,y){
  G.map=map;
  const p=G.player;
  p.x=p.tx=x;p.y=p.ty=y;p.px=x*TILE;p.py=y*TILE;p.moving=false;
}
function eggStep(){
  const egg=G.party.find(m=>m.isEgg);
  if(egg){
    egg.hatch--;
    if(egg.hatch<=0){
      const idx=G.party.indexOf(egg);
      const baby=makeMon(egg.sp,5);baby.nawa=120;
      G.party[idx]=baby;
      (async()=>{G.busy=true;await say('おや…? タマゴの ようすが…!');await say('タマゴから '+baby.name+'が うまれた!');caught(baby.id);G.busy=false;autoSave();})();
      return true;
    }
    return false;
  }
  if(G.daycare.length===2&&G.party.length<6){
    G.eggWalk=(G.eggWalk||0)+1;
    if(G.eggWalk>=40){
      G.eggWalk=0;
      const pid=G.daycare[rand(0,1)].id;
      G.party.push(makeEgg(pid));
      (async()=>{G.busy=true;await say('あずかりやの おねえさんから タマゴを うけとった!');await say('(あるいていると かえるかも… てもちに いれて あたためよう)');G.busy=false;autoSave();})();
      return true;
    }
  }
  return false;
}
async function daycareUI(){
  if(G.daycare.length<2){
    if(G.daycare.length===1)await say('おねえさん「いま '+G.daycare[0].name+'を あずかってるよ。」');
    else await say('おねえさん「モンスターを 2ひき あずけてくれたら めんどうみるよ!」');
    while(G.daycare.length<2){
      if(G.party.filter(m=>!m.isEgg).length<=1){await say('おねえさん「てもちが すくないから これいじょうは あずかれないよ」');break;}
      if(!await confirmAsk('モンスターを あずける?'))break;
      const m=await partyChoice('だれを あずける?',G.party,x=>!x.isEgg,'タマゴは あずけられない!');
      if(!m)break;
      G.party.splice(G.party.indexOf(m),1);G.daycare.push(m);
      await say('おねえさん「'+m.name+'を あずかったよ!」');
    }
    if(G.daycare.length===2){G.eggWalk=0;await say('おねえさん「2ひき そろったね。あるいてると タマゴが みつかるかも…!」');}
  }else{
    const i=await choice(['あずけた子を ひきとる','ようすを きく','やめる'],{title:'モンスターあずかりや'});
    if(i===0){
      for(const m of [...G.daycare]){
        if(G.party.length>=6){await say('てもちが いっぱいで '+m.name+'は ひきとれない…');continue;}
        G.party.push(m);G.daycare.splice(G.daycare.indexOf(m),1);
        await say('おねえさん「'+m.name+'を かえすね!」');
      }
      G.eggWalk=0;
    }else if(i===1){
      await say(G.party.some(m=>m.isEgg)?'おねえさん「もう タマゴを わたしたよ。だいじに あたためてね」'
        :'おねえさん「2ひきは なかよし。あるいてると タマゴが みつかるよ」');
    }
  }
}
const GATE_BADGES={'ROUTE2>BEACH':2,'MINATO>ROUTE4':3,'RAIDEN>ROUTE5':4,'HOSHI>ROUTE6':5,'IWACITY>ROUTE7':6,'SORA>ROUTE8':7};
const GATE_GYM={2:'ホノオ',3:'ミナト',4:'ライデン',5:'ホシミ',6:'イワヤマ',7:'ソラ'};
function stepDone(){
  if(eggStep())return;
  const p=G.player,m=curMap(),key=p.x+','+p.y,t=tile(p.x,p.y);
  /* かぎ付き(行き先の無い)とびら: 無反応にしない */
  if(t==='D'&&!m.warps[key]){
    (async()=>{G.busy=true;await say('とびらには かぎが かかっている。だれも いないようだ。');G.busy=false;})();
    return;}
  /* ワープ */
  if(m.warps[key]){const w=m.warps[key];
    const need=GATE_BADGES[G.map+'>'+w[0]];
    if(need&&(G.bg||0)<need){
      (async()=>{G.busy=true;
        await say('けんもんじょの かかり「ここから さきへ いくには ジムバッジが '+need+'こ ひつようだ。」');
        await say('「いまは '+(G.bg||0)+'こ。'+GATE_GYM[need]+'ジムを クリアしてから また おいで!」');
        G.busy=false;})();
      return;}
    warpTo(w[0],w[1],w[2]);
    G.mapSign={name:curMap().name,t0:performance.now()};
    autoSave();
    return;}
  /* アイテム */
  if(t==='I'&&m.items[key]&&!G.fl['item_'+G.map+'_'+key]){
    G.fl['item_'+G.map+'_'+key]=true;
    const it=m.items[key];G.items[it[0]]+=it[1];
    (async()=>{G.busy=true;await say(ITEMS[it[0]].name+'を '+it[1]+'こ ひろった!');G.busy=false;autoSave();})();
    return;
  }
  /* 回復 */
  if(t==='H'){
    G.party.forEach(healFull);
    (async()=>{G.busy=true;await say('ハートのゆかの ちからで モンスターたちは げんきに なった!');G.busy=false;})();
    return;
  }
  /* ストーリートリガー */
  for(const tg of TRIGGERS){
    if(tg.map!==G.map)continue;
    if(tg.flag&&G.fl[tg.flag])continue;
    if(tg.cond&&!tg.cond())continue;
    if(!tg.when(p.x,p.y))continue;
    if(tg.flag)G.fl[tg.flag]=true;
    (async()=>{await tg.run();})();
    return;
  }
  /* トレーナー視線 */
  for(const n of npcsHere()){
    if(!n.trainer||!n.sight||G.fl.df[n.id])continue;
    const d=DIRS[n.dir||'down'];
    for(let s=1;s<=n.sight;s++){
      const sx=n.x+d[0]*s,sy=n.y+d[1]*s;
      if(!WALK.includes(tile(sx,sy)))break;
      const other=npcAt(sx,sy);
      if(other)break;
      if(sx===p.x&&sy===p.y){
        (async()=>{
          G.busy=true;
          await say('!');
          await doTrainer(n);
          G.busy=false;
        })();
        return;
      }
    }
  }
  /* むしよけスプレー: 歩くごとに カウントダウン */
  if(G.repel>0){
    G.repel--;
    if(G.repel===0){(async()=>{G.busy=true;await say('むしよけスプレーの こうかが きれた。');G.busy=false;})();}
  }
  /* エンカウント */
  const enc=m.enc;
  if(enc&&(t==='G'||t==='C')&&G.repel<=0&&Math.random()<enc.rate){
    const pool=[];
    enc.tbl.forEach(e=>{for(let i=0;i<e[3];i++)pool.push(e);});
    const e=pool[rand(0,pool.length-1)];
    wildBattle(e[0],rand(e[1],e[2]));
  }
}
async function doTrainer(n){
  const won=await trainerBattle(n.trainer);
  if(won)G.fl.df[n.id]=true;
  /* ジムリーダー撃破後の特別メッセージ */
  if(won&&n.id==='lead1')await say('ツタコ「グリーンバッジが あれば もりの けいびいんも とおしてくれるわ」');
  if(won&&n.id==='kagari')await say('(オオタは いんせきの かけらを もって たちさった…)');
  if(won&&n.id==='gouka'){
    await say('のざわ「いんせきよ! ちからを はなて!」');
    await say('…いせきが ゆれている!');
    await say('でんせつの モンスター エメロードが めざめた!!');
    await sleep(400);
    await wildBattle('EMERODO',50);
  }
  if(won&&n.id==='champ')await ending();
}
function updateWorld(dt){
  if(G.mode!=='overworld')return;
  if(!G.visited)G.visited=[];
  if(G.visited.indexOf(G.map)<0)G.visited.push(G.map);
  if(!G.lastTown)G.lastTown='MIDORI';
  if(WAKEPOINTS[G.map])G.lastTown=G.map;
  const p=G.player;
  if(p.moving){
    p.t+=dt/(held.b?100:170);
    if(p.t>=1){p.x=p.tx;p.y=p.ty;p.px=p.x*TILE;p.py=p.y*TILE;p.moving=false;stepDone();}
    else{p.px=(p.x+(p.tx-p.x)*p.t)*TILE;p.py=(p.y+(p.ty-p.y)*p.t)*TILE;}
  }else if(!G.busy&&!G.msg&&!G.choice){
    const d=held.up?'up':held.down?'down':held.left?'left':held.right?'right':null;
    if(d){
      p.dir=d;
      const nx=p.x+DIRS[d][0],ny=p.y+DIRS[d][1];
      if(walkable(nx,ny)){p.tx=nx;p.ty=ny;p.t=0;p.moving=true;}
    }
  }
}

async function summaryView(team,idx){
  const s={team,idx,page:0,mcur:0,held:null};G.summary=s;
  try{
    while(true){
      const k=await waitKey(['left','right','up','down','a','b']);
      const m=team[s.idx];
      if(s.page===1){
        const n=m.moves.length;
        if(k==='up')s.mcur=(s.mcur+n-1)%n;
        else if(k==='down')s.mcur=(s.mcur+1)%n;
        else if(k==='left'||k==='right'){
          if(s.held===null){s.idx=(s.idx+(k==='left'?team.length-1:1))%team.length;s.mcur=0;}
        }
        else if(k==='a'){
          if(s.held===null)s.held=s.mcur;
          else{
            if(s.held!==s.mcur){const t=m.moves[s.held];m.moves[s.held]=m.moves[s.mcur];m.moves[s.mcur]=t;}
            s.held=null;
          }
        }
        else if(k==='b'){if(s.held!==null)s.held=null;else{s.page=0;}}
      }else{
        if(k==='left')s.idx=(s.idx+team.length-1)%team.length;
        else if(k==='right')s.idx=(s.idx+1)%team.length;
        else if(k==='up'||k==='down'||k==='a'){s.page=1;s.mcur=0;s.held=null;}
        else if(k==='b')return;
      }
    }
  }finally{G.summary=null;}
}

async function zukanMenu(){
  const lines=ZUKAN_ORDER.map(id=>{
    const s=SPECIES[id];
    const mark=G.ct.includes(id)?'●':G.sn.includes(id)?'▲':'?';
    return ('00'+s.no).slice(-2)+' '+mark+' '+(G.sn.includes(id)?s.name+' ('+s.type+')':'?????');
  });
  await say('ずかん: みつけた '+G.sn.length+'/'+ZUKAN_ORDER.length+'  つかまえた '+G.ct.length+'/'+ZUKAN_ORDER.length+' (●=ゲット ▲=はっけん)');
  let page=0;
  const pages=Math.ceil(lines.length/8);
  while(true){
    const slice=lines.slice(page*8,page*8+8).concat(page<pages-1?['▼ つぎのページ']:['▲ さいしょに もどる']);
    const i=await choice(slice,{title:'モンスターずかん '+(page+1)+'/'+pages});
    if(i<0)return;
    if(i===slice.length-1){page=(page+1)%pages;continue;}
    const id=ZUKAN_ORDER[page*8+i];
    if(!id)continue;
    if(G.sn.includes(id)){
      const s=SPECIES[id];
      await say('No.'+('00'+s.no).slice(-2)+'  '+s.name+'  ('+s.type+'タイプ)');
      await say(descOf(id));

async function boxMenu(){
  if(!G.box.length){await say('ボックスは からっぽだ。');return;}
  const ui={sel:0};G.boxui=ui;
  try{
    while(true){
      if(!G.box.length)return;
      ui.sel=Math.max(0,Math.min(ui.sel,G.box.length-1));
      const k=await waitKey(['up','down','left','right','a','b']);
      if(k==='b')return;
      else if(k==='left')ui.sel=Math.max(0,ui.sel-1);
      else if(k==='right')ui.sel=Math.min(G.box.length-1,ui.sel+1);
      else if(k==='up')ui.sel=Math.max(0,ui.sel-2);
      else if(k==='down')ui.sel=Math.min(G.box.length-1,ui.sel+2);
      else if(k==='a'){
        const m=G.box[ui.sel];if(!m)continue;
        const swapLabel=G.party.length>=6?'てもちと いれかえる':'てもちに くわえる';
        const act=await choice(['つよさを みる',swapLabel,'もどる'],{title:m.name});
        if(act===0){
          await summaryView(G.box,ui.sel);
        }else if(act===1){
          if(G.party.length>=6){
            const o=await partyChoice('てもちの だれと いれかえる?',G.party);
            if(o){G.box[ui.sel]=o;G.party[G.party.indexOf(o)]=m;await say(m.name+'と '+o.name+'を いれかえた!');}
          }else{
            G.box.splice(ui.sel,1);G.party.push(m);await say(m.name+'を てもちに くわえた!');
            ui.sel=Math.max(0,Math.min(ui.sel,G.box.length-1));
          }
        }
      }
    }
  }finally{G.boxui=null;}
}

function loadSaveCode(code){
  try{
    code=code.trim();
    if(!code.startsWith('MM2.'))return false;
    const data=JSON.parse(decodeURIComponent(escape(atob(code.slice(4)))));
    if(data.v!==2||!Array.isArray(data.p)||!data.p.length)return false;
    const mk=e=>{const m=makeMon(e[0],e[1]);
      if(Array.isArray(e[7]))m.iv={hp:e[7][0],atk:e[7][1],def:e[7][2],spd:e[7][3],satk:e[7][4]!==undefined?e[7][4]:rand(0,31),sdef:e[7][5]!==undefined?e[7][5]:rand(0,31)};
      if(Array.isArray(e[8]))m.ev={hp:e[8][0],atk:e[8][1],def:e[8][2],spd:e[8][3],satk:e[8][4]||0,sdef:e[8][5]||0};
      m.nat=(e[9]!==undefined)?e[9]:0;
      recompute(m,true);
      m.exp=e[2];m.dexp=e[2];m.hp=Math.max(0,Math.min(m.maxhp,e[3]));m.status=e[4]||null;m.nawa=e[6]||70;
      if(Array.isArray(e[5])){const ord=e[5];m.moves.sort((a,b)=>{let ia=ord.indexOf(a.name),ib=ord.indexOf(b.name);if(ia<0)ia=99;if(ib<0)ib=99;return ia-ib;});}
      return m;};
    G.party=data.p.map(mk);
    G.box=(data.bx||[]).map(mk);
    G.daycare=(data.dc||[]).map(mk);
    G.eggWalk=data.ew||0;
    (data.eg||[]).forEach(e=>{if(SPECIES[e[0]]){const eg=makeEgg(e[0]);eg.sp=e[0];eg.id=e[0];eg.hatch=e[1]||25;G.party.push(eg);}});
    G.items={ball:data.it[0]||0,potion:data.it[1]||0,spotion:data.it[2]||0,superball:data.it[3]||0,hyperball:data.it[4]||0,cure:data.it[5]||0,revive:data.it[6]||0,ppaid:data.it[7]||0,tm_thunder:data.it[8]||0,tm_surf:data.it[9]||0,tm_fire:data.it[10]||0,tm_psy:data.it[11]||0,tm_ice:data.it[12]||0,tm_sword:data.it[13]||0,repel:data.it[14]||0};
    G.$=data.$||0;G.bg=data.bg||0;G.fl=data.fl||{df:{}};
    if(!G.fl.df)G.fl.df={};
    G.ct=data.ct||[];G.sn=data.sn||[];G.visited=data.vs||[];G.repel=0;G.lastTown=data.lt||'MIDORI';
    G.gender=data.gd||'boy';G.pname=data.nm||'ユウキ';
    if(!MAPS[data.mp])return false;
    warpTo(data.mp,data.x,data.y);
    return true;
  }catch(e){return false;}
}

const FLYPOINTS={MIDORI:[11,7],KUSAKI:[12,16],HONOO:[20,7],MINATO:[1,7],RAIDEN:[11,15],HOSHI:[1,8],IWACITY:[10,15],SORA:[1,7],MORI:[1,7]};
function nearestFly(from,dx,dy,list){
  const F=MAPNODES[from];let best=null,bs=1e9;
  for(const id of list){if(id===from)continue;const N=MAPNODES[id];
    const vx=N[0]-F[0],vy=N[1]-F[1];
    if(dx&&Math.sign(vx)!==dx)continue;if(dy&&Math.sign(vy)!==dy)continue;
    const along=dx?Math.abs(vx):Math.abs(vy),perp=dx?Math.abs(vy):Math.abs(vx);
    const score=along+perp*4;
    if(score<bs){bs=score;best=id;}
  }
  return best;
}
async function mapView(){
  if(!G.visited)G.visited=[];
  const fly=()=>Object.keys(FLYPOINTS).filter(id=>G.visited.indexOf(id)>=0);
  const cur=MAPNODES[G.map]?G.map:(GYMPARENT[G.map]||null);
  const ui={sel:(cur&&FLYPOINTS[cur]&&G.visited.indexOf(cur)>=0)?cur:(fly()[0]||null)};
  G.mapui=ui;G.mapview=true;
  try{
    while(true){
      const list=fly();if(ui.sel&&list.indexOf(ui.sel)<0)ui.sel=list[0]||null;
      const k=await waitKey(['a','b','up','down','left','right','start']);
      if(k==='b'||k==='start')break;
      else if(k==='a'){
        if(!ui.sel){await say('そらを とべる まちが まだ ない。');continue;}
        if(ui.sel===cur){await say('もう その まちに いる!');continue;}
        const name=MAPNODES[ui.sel][3];
        if(await confirmAsk(name+'へ そらを とぶ?')){
          const fp=FLYPOINTS[ui.sel],dest=ui.sel;
          G.mapview=false;G.mapui=null;
          await say('そらを とんで '+name+'へ ついた!');
          warpTo(dest,fp[0],fp[1]);
          G.mapSign={name:curMap().name,t0:performance.now()};
          return;
        }
      }else{
        const d={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]}[k];
        if(d&&ui.sel){const nx=nearestFly(ui.sel,d[0],d[1],list);if(nx)ui.sel=nx;}
      }
    }
  }finally{G.mapview=false;G.mapui=null;}
}

/* ================= ふたりでたいせん ================= */
async function pagedPick(items,title){
  let page=0;
  const per=6;
  const pages=Math.ceil(items.length/per);
  while(true){
    const slice=items.slice(page*per,page*per+per).map(e=>e[1]);
    slice.push('▼ つぎのページ ('+(page+1)+'/'+pages+')');
    const i=await choice(slice,{title,cancel:false});
    if(i===slice.length-1){page=(page+1)%pages;continue;}
    return items[page*per+i][0];
  }
}
async function vsCmd(b,pn){
  const team=pn===1?b.tA:b.tB;
  const active=pn===1?b.ally:b.enemy;
  await say('--- プレイヤー'+pn+'のばん ('+active.name+') ---');
  while(true){
    const i=await gridMenu(['たたかう','こうたい','---','---'],'P'+pn+': '+active.name+'は どうする?');
    if(i===0){
      const mi=await movesMenu(active);
      if(mi>=0){
        const mv=active.moves[mi];
        if(mv.pp<=0){await say('わざの PPが のこっていない!');continue;}
        return{type:'move',mv};
      }
    }else if(i===1){
      const t=await partyChoice('だれと いれかえる?',team,m=>m!==active&&m.hp>0,'たたかえる じょうたいじゃない!');
      if(t)return{type:'switch',mon:t};
    }
  }
}
async function vsFaint(b,def){
  await say(def.name+'は たおれた!');
  const team=b.tA.includes(def)?b.tA:b.tB;
  const pn=team===b.tA?1:2;
  const alive=team.filter(m=>m.hp>0);
  if(!alive.length){
    await say('プレイヤー'+pn+'の モンスターは ぜんめつ!');
    await say('☆☆ プレイヤー'+(pn===1?2:1)+'の かち!! ☆☆');
    return true;
  }
  const nm=await partyChoice('プレイヤー'+pn+': つぎは だれ?',team,m=>m.hp>0,'たたかえる じょうたいじゃない!');
  if(team===b.tA)b.ally=nm;else b.enemy=nm;
  await say('いけ! '+nm.name+'!');
  return false;
}
async function vsBattle(tA,tB){
  G.mode='battle';G.busy=true;playBGM('battle');
  const b={kind:'vs',ally:tA[0],enemy:tB[0],tA,tB};
  G.battle=b;
  await say('たいせん スタート! おたがい 3たいの モンスターで しょうぶ!');
  outer:while(true){
    const cA=await vsCmd(b,1);
    const cB=await vsCmd(b,2);
    if(cA.type==='switch'){b.ally=cA.mon;await say('P1は '+b.ally.name+'を くりだした!');}
    if(cB.type==='switch'){b.enemy=cB.mon;await say('P2は '+b.enemy.name+'を くりだした!');}
    const acts=[];
    if(cA.type==='move')acts.push({att:b.ally,defGet:()=>b.enemy,mv:cA.mv});
    if(cB.type==='move')acts.push({att:b.enemy,defGet:()=>b.ally,mv:cB.mv});
    orderActs(acts);
    for(const act of acts){
      await performAct(b,act);
      const def=act.defGet();
      if(def.hp<=0){if(await vsFaint(b,def))break outer;}
    }
    await poisonTick(b.ally);await poisonTick(b.enemy);
    if(b.ally.hp<=0){if(await vsFaint(b,b.ally))break;}
    if(b.enemy.hp<=0){if(await vsFaint(b,b.enemy))break;}
  }
  G.battle=null;G.busy=false;
  showTitle();
}

let last=performance.now();
/* フリーズ対策: どんな例外でも 安全な ふつうの状態へ復帰させる */
function recoverState(){
  try{
    waiting=null;G.choice=null;G.msg=null;G.battle=null;
    if(G.mode==='battle'||G.mode==='vspick'||G.mode==='vsbattle'){
      G.mode='overworld';if(typeof playBGM==='function')playBGM('overworld');
    }
    G.busy=false;G._stuck=0;
    if(typeof ovl!=='undefined'&&ovl)ovl.style.display='none';
  }catch(e){}
}
/* await し忘れの async処理で例外が出ても フリーズしないように復帰 */
addEventListener('unhandledrejection',ev=>{console.error('unhandled rejection:',ev&&ev.reason);recoverState();});
function loop(now){
  const dt=Math.min(50,now-last);last=now;G.time=now;
  if(G.msg&&G.msg.t!==undefined&&G.msg.n<G.msg.t.length)
    G.msg.n=Math.min(G.msg.t.length,G.msg.n+dt/24);
  try{ updateWorld(dt); render(); }
  catch(err){ console.error('loop error:',err); recoverState(); }
  /* ウォッチドッグ: overworldで何も保留していないのに busyが固まったら解除 */
  if(G.mode==='overworld'&&G.busy&&!G.msg&&!G.choice&&!G.battle&&!waiting&&
     (typeof ovl==='undefined'||!ovl||ovl.style.display!=='flex')){
    G._stuck=(G._stuck||0)+dt;
    if(G._stuck>4000){G.busy=false;G._stuck=0;console.warn('busy watchdog reset');}
  }else{G._stuck=0;}
  /* ディープ・ウォッチドッグ: どのモードでも 入力待ち/メッセージ/メニュー/演出 のどれも無いのに
     busyが固まったら(=未解決のPromiseで停止) 安全状態へ復帰させる */
  const fxOn=!!(G.battle&&G.battle.fx);
  const ovlFlex=(typeof ovl!=='undefined'&&ovl&&ovl.style.display==='flex');
  if(G.busy&&!waiting&&!G.msg&&!G.choice&&!G.bmenu&&!G.forgetui&&!fxOn&&!ovlFlex&&
     G.mode!=='title'&&G.mode!=='starter'){
    G._stuck2=(G._stuck2||0)+dt;
    if(G._stuck2>6500){console.warn('deep watchdog recover');recoverState();G._stuck2=0;}
  }else{G._stuck2=0;}
  requestAnimationFrame(loop);
}
showTitle();
