<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ミニモン 〜エメラルドのでんせつ〜</title>
<style>
  html,body{margin:0;padding:0;background:#16281c;font-family:sans-serif;
    -webkit-user-select:none;user-select:none;overscroll-behavior:none;}
  #wrap{display:flex;flex-direction:column;align-items:center;min-height:100vh;}
  h1{color:#9fe3a0;font-size:14px;letter-spacing:3px;margin:8px 0 4px;font-weight:normal;}
  #game{width:min(100vw,480px);aspect-ratio:3/2;image-rendering:pixelated;
    background:#000;border:4px solid #3e5a3e;border-radius:6px;box-sizing:border-box;}
  #pad{display:flex;justify-content:space-between;align-items:center;
    width:min(100vw,480px);padding:14px 8px;box-sizing:border-box;touch-action:none;}
  #dpad{display:grid;grid-template-areas:". u ." "l c r" ". d .";
    grid-template-columns:46px 46px 46px;grid-template-rows:46px 46px 46px;gap:2px;}
  .db{background:#2c452c;color:#9fe3a0;border:2px solid #527a52;border-radius:8px;font-size:18px;touch-action:none;}
  .db:active{background:#527a52;}
  #ab{display:flex;gap:14px;align-items:flex-end;}
  .ab{width:58px;height:58px;border-radius:50%;background:#7a2c2c;color:#ffd9d9;
    border:2px solid #a85252;font-size:20px;font-weight:bold;touch-action:none;}
  .ab:active{background:#a85252;}
  #startb{background:#2c452c;color:#9fe3a0;border:2px solid #527a52;border-radius:14px;
    padding:8px 16px;font-size:11px;letter-spacing:1px;touch-action:none;}
  #startb:active{background:#527a52;}
  #hint{color:#6a9a6a;font-size:11px;margin-bottom:10px;text-align:center;line-height:1.6;padding:0 8px;}
  button{outline:none;-webkit-tap-highlight-color:transparent;}
  #ovl{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:none;
    align-items:center;justify-content:center;z-index:10;}
  #ovl .panel{background:#f4f0e2;border:4px solid #385078;border-radius:8px;
    width:min(92vw,420px);padding:16px;box-sizing:border-box;}
  #ovl h3{margin:0 0 10px;color:#385078;font-size:16px;}
  #ovlText{width:100%;height:110px;box-sizing:border-box;font-size:12px;
    font-family:monospace;border:2px solid #8aa0c0;border-radius:4px;padding:6px;background:#fff;}
  #ovl .row{display:flex;gap:10px;margin-top:12px;justify-content:flex-end;}
  #ovl button{padding:9px 18px;border-radius:6px;border:2px solid #385078;
    background:#dce8f8;color:#283850;font-size:14px;}
  #ovl button:active{background:#aac4e8;}
  #ovlNote{font-size:12px;color:#666;margin-top:8px;line-height:1.5;}
</style>
</head>
<body>
<div id="wrap">
  <h1>MINIMON LEGEND</h1>
  <canvas id="game" width="480" height="320"></canvas>
  <div id="pad">
    <div id="dpad">
      <button class="db" data-k="up" style="grid-area:u">▲</button>
      <button class="db" data-k="left" style="grid-area:l">◀</button>
      <button class="db" data-k="right" style="grid-area:r">▶</button>
      <button class="db" data-k="down" style="grid-area:d">▼</button>
    </div>
    <button id="startb" data-k="start">START</button>
    <div id="ab">
      <button class="ab" data-k="b">B</button>
      <button class="ab" data-k="a">A</button>
    </div>
  </div>
  <div id="hint">矢印=移動(B押しながらでダッシュ) / Z=A(決定・調べる) / X=B(戻る) / Enter=START(メニュー)<br>セーブは メニュー→「レポートをかく」でコードを保存してね</div>
</div>
<div id="ovl"><div class="panel">
  <h3 id="ovlTitle">レポート</h3>
  <textarea id="ovlText" spellcheck="false"></textarea>
  <div id="ovlNote"></div>
  <div class="row">
    <button id="ovlCopy">コピー</button>
    <button id="ovlOk">けってい</button>
    <button id="ovlClose">とじる</button>
  </div>
</div></div>

function drawSpr(s,x,y,sc,flip,pal){
  const c=pal||s.c;
  for(let j=0;j<16;j++){const row=s.r[j]||'';
    for(let i=0;i<16;i++){
      const ch=row[flip?15-i:i];
      if(!ch||ch==='.')continue;
      const col=c[ch];if(!col)continue;
      ctx.fillStyle=col;ctx.fillRect(x+i*sc,y+j*sc,sc,sc);
    }}
}

const _shadeCache={};
function shade(col,f){
  const key=col+f;if(_shadeCache[key])return _shadeCache[key];
  const n=parseInt(col.slice(1),16);
  const r=Math.min(255,Math.round(((n>>16)&255)*f)),
        g=Math.min(255,Math.round(((n>>8)&255)*f)),
        b=Math.min(255,Math.round((n&255)*f));
  return _shadeCache[key]='rgb('+r+','+g+','+b+')';
}
/* 32x32スプライト描画: 自動輪郭線 + 上ハイライト/下右シェード */
function drawMon32(key,x,y,sc,flip,pal){
  const rows=MSPR32[key],c=pal||SPRITES[key].c,p=sc/2;
  const at=(i,j)=>{
    if(i<0||i>31||j<0||j>31)return '.';
    const r=rows[j];const ch=r[flip?31-i:i];
    return ch||'.';
  };
  for(let j=0;j<32;j++)for(let i=0;i<32;i++){
    const ch=at(i,j);
    if(ch==='.'){
      if(at(i+1,j)!=='.'||at(i-1,j)!=='.'||at(i,j+1)!=='.'||at(i,j-1)!=='.'){
        ctx.fillStyle='rgba(38,38,50,0.85)';
        ctx.fillRect(x+i*p,y+j*p,p+0.5,p+0.5);
      }
      continue;
    }
    let col=c[ch];if(!col)continue;
    if(at(i,j+1)==='.'||(at(i+1,j)==='.'&&at(i-1,j)!=='.'))col=shade(col,0.7);
    else if(at(i,j-1)==='.')col=shade(col,1.28);
    else if(j>=22)col=shade(col,0.88);
    ctx.fillStyle=col;ctx.fillRect(x+i*p,y+j*p,p+0.5,p+0.5);
  }
}
function drawMon(m,x,y,sc,flip){
  const sp=SPECIES[m.id];
  drawMon32(sp.spr,x,y,sc,flip,sp.pal||null);
}

function recompute(m,full){
  const b=SPECIES[m.id].base;
  const dmg=full?0:Math.max(0,m.maxhp-m.hp);
  m.maxhp=Math.floor(b.hp*2*m.lv/100)+m.lv+10;
  m.stats={atk:Math.floor(b.atk*2*m.lv/100)+5,
           def:Math.floor(b.def*2*m.lv/100)+5,
           spd:Math.floor(b.spd*2*m.lv/100)+5};
  m.hp=full?m.maxhp:Math.max(1,m.maxhp-dmg);
  m.dhp=m.hp;
}
function movesFor(id,lv){
  return SPECIES[id].learn.filter(e=>e[0]<=lv).slice(-4)
    .map(e=>({name:e[1],pp:MOVES[e[1]].pp,maxpp:MOVES[e[1]].pp}));
}
function makeMon(id,lv,mvNames){
  const m={id,lv,exp:lv*lv*lv,name:SPECIES[id].name,st:{atk:0,def:0,spd:0},status:null,
    g:id==='EMERODO'?'':(Math.random()<0.5?'♂':'♀')};
  recompute(m,true);
  m.moves=mvNames?mvNames.map(n=>({name:n,pp:MOVES[n].pp,maxpp:MOVES[n].pp})):movesFor(id,lv);
  m.dhp=m.hp;
  return m;
}
function healFull(m){m.hp=m.maxhp;m.dhp=m.hp;m.status=null;m.moves.forEach(v=>v.pp=v.maxpp);m.st={atk:0,def:0,spd:0};}
const stg=s=>s>=0?(2+s)/2:2/(2-s);

const effSpd=m=>m.stats.spd*stg(m.st.spd)*(m.status==='PAR'?0.5:1);
const expFrac=m=>{const a=m.lv**3,b=(m.lv+1)**3;return Math.max(0,Math.min(1,(m.exp-a)/(b-a)));};

<script>
/* ================= ゲーム状態 ================= */
const G={mode:'title',busy:false,msg:null,choice:null,bmenu:null,battle:null,
  starterIdx:0,vsText:'',vsPicked:[[],[]],time:0,
  map:'MIDORI',player:{x:11,y:7,px:11*TILE,py:7*TILE,dir:'down',moving:false,t:0,tx:11,ty:7},
  party:[],box:[],items:{ball:0,potion:0,spotion:0},$:0,bg:0,fl:{df:{}},
  ct:[],sn:[]};
const DIRS={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
const curMap=()=>MAPS[G.map];
function tile(x,y){const m=curMap();if(y<0||y>=m.rows.length||x<0||x>=m.rows[0].length)return m.pad;return m.rows[y][x];}
function npcsHere(){return NPCS.filter(n=>n.map===G.map&&(!n.cond||n.cond()));}
function npcAt(x,y){return npcsHere().find(n=>n.x===x&&n.y===y);}
function walkable(x,y){return WALK.includes(tile(x,y))&&!npcAt(x,y);}
function seen(id){if(!G.sn.includes(id))G.sn.push(id);}
function caught(id){seen(id);if(!G.ct.includes(id))G.ct.push(id);}
/* ================= 入力 ================= */
let waiting=null;const held={};
const ovl=document.getElementById('ovl');
function waitKey(valid){return new Promise(res=>{waiting={valid,res};});}
function press(k){
  if(ovl.style.display==='flex')return;
  if(waiting&&waiting.valid.includes(k)){const w=waiting;waiting=null;w.res(k);return;}
  if(k==='start'&&G.mode==='overworld'&&!G.busy&&!G.msg&&!G.choice)openMenu();
}
const KEYMAP={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',
  z:'a',Z:'a',x:'b',X:'b',Enter:'start'};
addEventListener('keydown',e=>{
  if(ovl.style.display==='flex')return;
  const k=KEYMAP[e.key];if(!k)return;e.preventDefault();
  if(!e.repeat)press(k);held[k]=true;});
addEventListener('keyup',e=>{const k=KEYMAP[e.key];if(k)held[k]=false;});
document.querySelectorAll('[data-k]').forEach(b=>{
  const k=b.dataset.k;
  b.addEventListener('pointerdown',e=>{e.preventDefault();press(k);held[k]=true;});
  ['pointerup','pointercancel','pointerleave'].forEach(ev=>
    b.addEventListener(ev,()=>{held[k]=false;}));
});
/* ================= UIヘルパー ================= */
async function say(t){
  G.msg={t:String(t),n:0};
  while(true){
    await waitKey(['a','b']);
    if(G.msg&&G.msg.n<G.msg.t.length){G.msg.n=G.msg.t.length;continue;}
    break;
  }
  G.msg=null;
}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
async function choice(items,opt){
  opt=opt||{};
  const c={items,index:opt.index||0,title:opt.title||''};G.choice=c;
  try{
    while(true){
      const k=await waitKey(['up','down','a','b']);
      if(k==='up')c.index=(c.index+items.length-1)%items.length;
      else if(k==='down')c.index=(c.index+1)%items.length;
      else if(k==='a')return c.index;
      else if(k==='b'&&opt.cancel!==false)return -1;
    }
  }finally{G.choice=null;}
}
async function confirmAsk(t){G.msg={t:String(t),n:t.length};const i=await choice(['はい','いいえ'],{cancel:false});G.msg=null;return i===0;}
async function gridMenu(items,label){
  const m={items,index:0,grid:true,label};G.bmenu=m;
  try{
    while(true){
      const k=await waitKey(['up','down','left','right','a','b']);
      if(k==='left'||k==='right')m.index^=1;
      else if(k==='up'||k==='down')m.index^=2;
      else if(k==='a')return m.index;
      else if(k==='b')return -1;
    }
  }finally{G.bmenu=null;}
}
async function movesMenu(mon){
  const items=mon.moves.map(v=>v.name);while(items.length<4)items.push('---');
  const m={items,index:0,grid:true,moves:mon.moves};G.bmenu=m;
  try{
    while(true){
      const k=await waitKey(['up','down','left','right','a','b']);
      if(k==='left'||k==='right')m.index^=1;
      else if(k==='up'||k==='down')m.index^=2;
      else if(k==='a'){if(m.index<mon.moves.length)return m.index;}
      else if(k==='b')return -1;
    }
  }finally{G.bmenu=null;}
}
function monLabel(m){
  return m.name+' Lv'+m.lv+' HP'+m.hp+'/'+m.maxhp+(m.status?'['+(m.status==='PAR'?'まひ':'どく')+']':'')+(m.hp<=0?'[ひんし]':'');
}
async function partyChoice(title,team,filter,failMsg){
  if(!team.length)return null;
  const pk={team,index:0,title:title||'モンスターを えらんでください'};
  G.pick=pk;
  try{
    while(true){
      const k=await waitKey(['up','down','left','right','a','b']);
      if(k==='up')pk.index=(pk.index+team.length-1)%team.length;
      else if(k==='down')pk.index=(pk.index+1)%team.length;
      else if(k==='left'||k==='right'){if(team.length>1)pk.index=pk.index===0?1:0;}
      else if(k==='a'){
        const m=team[pk.index];
        if(filter&&!filter(m)){await say(failMsg||'それは えらべない!');continue;}
        return m;
      }else if(k==='b')return null;
    }
  }finally{G.pick=null;}
}
/* ================= バトルエンジン ================= */
function calcDmg(att,def,base){
  const eff=effOf(base.t,SPECIES[def.id].type);
  const stab=base.t===SPECIES[att.id].type?1.5:1;
  const a=att.stats.atk*stg(att.st.atk);
  const d=Math.max(1,def.stats.def*stg(def.st.def));
  let dmg=Math.floor((Math.floor(2*att.lv/5+2)*base.pow*a/d)/50)+2;
  dmg=Math.max(1,Math.floor(dmg*stab*eff*(0.85+Math.random()*0.15)));
  return{dmg,eff};
}
function hpAnim(m){
  return new Promise(r=>{
    if(m.dhp===undefined)m.dhp=m.hp;
    const iv=setInterval(()=>{
      const d=m.hp-m.dhp;
      if(Math.abs(d)<0.9){m.dhp=m.hp;clearInterval(iv);r();}
      else m.dhp+=Math.sign(d)*Math.max(0.7,m.maxhp/45);
    },30);
  });
}
async function fxAnim(side,type){
  if(!G.battle)return;
  G.battle.fx={side,type,t0:performance.now()};
  await sleep(type==='lunge'?230:380);
  if(G.battle)G.battle.fx=null;
}
function sideOf(m){return G.battle&&m===G.battle.ally?'ally':'enemy';}
async function attack(att,def,mv){
  const base=MOVES[mv.name];
  if(mv.pp!==undefined&&base.pp<900)mv.pp=Math.max(0,mv.pp-1);
  await say(att.name+'の '+mv.name+'!');
  if(base.splash){await say('しかし なにも おこらない!');return;}
  if(Math.random()*100>=base.acc){await say('しかし こうげきは はずれた!');return;}
  if(base.pow>0){
    await fxAnim(sideOf(att),'lunge');
    const r=calcDmg(att,def,base);
    def.hp=Math.max(0,def.hp-r.dmg);
    await fxAnim(sideOf(def),'hit');
    await hpAnim(def);
    if(r.eff>1)await say('こうかは ばつぐんだ!');
    else if(r.eff<1)await say('こうかは いまひとつのようだ…');
    if(base.drain&&r.dmg>0){
      att.hp=Math.min(att.maxhp,att.hp+Math.ceil(r.dmg*base.drain));
      await hpAnim(att);
      await say(def.name+'から たいりょくを すいとった!');
    }
  }
  if(base.stat&&def.hp>0){
    for(const k in base.stat)def.st[k]=Math.max(-6,Math.min(6,def.st[k]+base.stat[k]));
    const nm={atk:'こうげき',def:'ぼうぎょ',spd:'すばやさ'};
    const key=Object.keys(base.stat)[0];
    await say(def.name+'の '+nm[key]+'が '+(base.stat[key]<=-2?'がくっと ':'')+'さがった!');
  }
  if(base.self){
    for(const k in base.self)att.st[k]=Math.max(-6,Math.min(6,att.st[k]+base.self[k]));
    await say(att.name+'の ぼうぎょが あがった!');
  }
  if(base.fx&&def.hp>0&&!def.status&&Math.random()*100<base.fx.c){
    def.status=base.fx.s;
    await say(def.name+'は '+(base.fx.s==='PAR'?'まひして わざが でにくくなった!':'どくを あびた!'));
  }
}
function pickAI(m,foe){
  const us=m.moves.filter(v=>v.pp>0);
  if(!us.length)return{name:'わるあがき',pp:1,maxpp:1};
  if(foe&&Math.random()<0.7){
    let best=us[0],bs=-1;
    for(const v of us){
      const b=MOVES[v.name];
      const s=(b.pow||0)*effOf(b.t,SPECIES[foe.id].type)*(b.t===SPECIES[m.id].type?1.5:1);
      if(s>bs){bs=s;best=v;}
    }
    return best;
  }
  return us[rand(0,us.length-1)];
}
function orderActs(acts){
  return acts.sort((p,q)=>{
    const pp=(MOVES[p.mv.name].pri||0),qp=(MOVES[q.mv.name].pri||0);
    if(pp!==qp)return qp-pp;
    const ds=effSpd(q.att)-effSpd(p.att);
    if(ds!==0)return ds;
    return Math.random()-0.5;
  });
}
async function performAct(b,act){
  const att=act.att;if(att.hp<=0)return;
  if(att.status==='PAR'&&Math.random()<0.25){
    await say(att.name+'は からだが しびれて うごけない!');return;
  }
  const def=act.defGet();
  if(def.hp<=0)return;
  await attack(att,def,act.mv);
}
async function poisonTick(m){
  if(m.status==='PSN'&&m.hp>0){
    m.hp=Math.max(0,m.hp-Math.max(1,Math.floor(m.maxhp/8)));
    await say(m.name+'は どくの ダメージを うけている!');
    await hpAnim(m);
  }
}
async function learnMovesAt(m,lv){
  for(const e of SPECIES[m.id].learn){
    if(e[0]===lv&&!m.moves.some(v=>v.name===e[1])){
      const nm={name:e[1],pp:MOVES[e[1]].pp,maxpp:MOVES[e[1]].pp};
      if(m.moves.length<4){m.moves.push(nm);await say(m.name+'は '+e[1]+'を おぼえた!');}
      else{const old=m.moves.shift();m.moves.push(nm);
        await say(old.name+'を わすれて '+e[1]+'を おぼえた!');}
    }
  }
}
async function gainExp(m,foe,mult){
  const g=Math.floor(SPECIES[foe.id].bexp*foe.lv/7*(mult||1))+3;
  m.exp+=g;
  await say(m.name+'は '+g+'の けいけんちを もらった!');
  while(m.lv<60&&m.exp>=(m.lv+1)**3){
    m.lv++;recompute(m,false);
    await say(m.name+'は レベル'+m.lv+'に あがった!');
    await learnMovesAt(m,m.lv);
    const ev=SPECIES[m.id].evo;
    if(ev&&m.lv>=ev.lv){
      await say('おや…!? '+m.name+'の ようすが…!');
      m.id=ev.to;m.name=SPECIES[ev.to].name;recompute(m,false);
      caught(m.id);
      await say('おめでとう! '+m.name+'に しんかした!');
      await learnMovesAt(m,m.lv);
    }
  }
}
function endStg(){G.party.forEach(m=>{m.st={atk:0,def:0,spd:0};});}
async function blackout(){
  await say('めのまえが まっくらに なった!');
  G.$=Math.floor(G.$/2);
  await say('おかねを はんぶん おとしてしまった…');
  G.party.forEach(healFull);
  G.map='MIDORI';
  const p=G.player;p.x=p.tx=3;p.y=p.ty=9;p.px=3*TILE;p.py=9*TILE;p.moving=false;
}
async function allyFaintWild(b){
  await say(b.ally.name+'は たおれた!');
  const alive=G.party.filter(m=>m.hp>0);
  if(!alive.length){await blackout();return true;}
  const nm=await partyChoice('つぎは だれを だす?',G.party,m=>m.hp>0,'たたかえる じょうたいじゃない!');
  b.ally=nm;await say('いけ! '+nm.name+'!');
  return false;
}
async function checkFaintsWild(b){
  if(b.enemy.hp<=0&&!b.enemyDone){
    b.enemyDone=true;
    await say('やせいの '+b.enemy.name+'は たおれた!');
    await gainExp(b.ally,b.enemy,1);
    return 'win';
  }
  if(b.ally.hp<=0){if(await allyFaintWild(b))return 'lose';}
  return null;
}
async function battleMenu(b){
  while(true){
    const i=await gridMenu(['たたかう','バッグ','モンスター','にげる'],b.ally.name+'は どうする?');
    if(i===0){
      const mi=await movesMenu(b.ally);
      if(mi>=0){
        const mv=b.ally.moves[mi];
        if(mv.pp<=0){await say('わざの PPが のこっていない!');continue;}
        return{type:'move',mv};
      }
    }else if(i===1){
      const opts=[];
      if(b.kind==='wild')opts.push(['ball','キャプチャボール ×'+G.items.ball]);
      opts.push(['potion','キズぐすり ×'+G.items.potion]);
      opts.push(['spotion','いいキズぐすり ×'+G.items.spotion]);
      const ii=await choice(opts.map(o=>o[1]),{title:'バッグ'});
      if(ii<0)continue;
      const key=opts[ii][0];
      if(key==='ball'){
        if(G.items.ball<=0){await say('ボールが ない!');continue;}
        return{type:'ball'};
      }
      if(G.items[key]<=0){await say('もう もっていない!');continue;}
      const t=await partyChoice('だれに つかう?',G.party,m=>m.hp>0&&m.hp<m.maxhp,'いまは つかえない!');
      if(t)return{type:'item',key,mon:t};
    }else if(i===2){
      const t=await partyChoice('だれと いれかえる?',G.party,m=>m!==b.ally&&m.hp>0,'たたかえる じょうたいじゃない!');
      if(t)return{type:'switch',mon:t};
    }else if(i===3){
      if(b.kind!=='wild'){await say('トレーナーせんから にげられない!');continue;}
      return{type:'run'};
    }
  }
}
async function useItem(cmd){
  G.items[cmd.key]--;
  cmd.mon.hp=Math.min(cmd.mon.maxhp,cmd.mon.hp+ITEMS[cmd.key].heal);
  await hpAnim(cmd.mon);
  await say(cmd.mon.name+'の きずが かいふくした!');
}
/* --- 野生バトル --- */
async function wildBattle(id,lv){
  G.busy=true;G.mode='battle';
  const enemy=makeMon(id,lv);seen(id);
  const b={kind:'wild',ally:G.party.find(m=>m.hp>0),enemy};
  G.battle=b;
  await say('あ! やせいの '+enemy.name+'が とびだしてきた!');
  await say('いけ! '+b.ally.name+'!');
  let result=null;
  loop:while(true){
    const cmd=await battleMenu(b);
    if(cmd.type==='run'){
      if(Math.random()<(effSpd(b.ally)>=effSpd(b.enemy)?1:0.6)){
        await say('うまく にげきれた!');break;
      }
      await say('にげられない!');
    }else if(cmd.type==='ball'){
      G.items.ball--;
      await say('キャプチャボールを なげた!');
      b.enemyHidden=true;
      await say('・・・ ・・・ ・・・');
      const rate=(1-(b.enemy.hp/b.enemy.maxhp)*0.7)*(SPECIES[b.enemy.id].catch||0.5)*(b.enemy.status?1.4:1);
      if(Math.random()<rate){
        await say('やったー! '+b.enemy.name+'を つかまえた!');
        caught(b.enemy.id);
        healFull(b.enemy);
        if(G.party.length<6){G.party.push(b.enemy);
          await say(b.enemy.name+'は なかまに なった!');}
        else{G.box.push(b.enemy);
          await say('てもちが いっぱいなので '+b.enemy.name+'は ボックスに おくられた!');}
        if(b.enemy.id==='EMERODO')G.fl.emerald=true;
        break;
      }
      b.enemyHidden=false;
      await say('ああ! ボールから でてきてしまった!');
    }else if(cmd.type==='item'){
      await useItem(cmd);
    }else if(cmd.type==='switch'){
      b.ally=cmd.mon;await say('いけ! '+b.ally.name+'!');
    }else if(cmd.type==='move'){
      const acts=orderActs([
        {att:b.ally,defGet:()=>b.enemy,mv:cmd.mv},
        {att:b.enemy,defGet:()=>b.ally,mv:pickAI(b.enemy,b.ally)}]);
      for(const act of acts){
        await performAct(b,act);
        result=await checkFaintsWild(b);
        if(result)break loop;
      }
      await poisonTick(b.ally);await poisonTick(b.enemy);
      result=await checkFaintsWild(b);
      if(result)break loop;
      continue;
    }
    /* 行動を消費した場合は敵の攻撃 */
    if(b.enemy.hp>0){
      await performAct(b,{att:b.enemy,defGet:()=>b.ally,mv:pickAI(b.enemy,b.ally)});
      result=await checkFaintsWild(b);
      if(result)break loop;
      await poisonTick(b.ally);await poisonTick(b.enemy);
      result=await checkFaintsWild(b);
      if(result)break loop;
    }
  }
  endStg();
  if(b.enemy.id==='EMERODO'&&b.enemyDone&&!G.ct.includes('EMERODO')){
    G.fl.emerald=true;
    await say('エメロードは しずかに ねむりに ついた… (さいだんを しらべれば もういちど いどめる)');
  }
  G.battle=null;G.mode='overworld';G.busy=false;
}
/* --- トレーナーバトル --- */
async function trainerBattle(tr){
  G.busy=true;G.mode='battle';
  const teamDef=typeof tr.team==='function'?tr.team():tr.team;
  const eteam=teamDef.map(e=>makeMon(e[0],e[1]));
  const b={kind:'trainer',ally:G.party.find(m=>m.hp>0),enemy:eteam[0],eteam,ei:0,trname:tr.name};
  G.battle=b;seen(b.enemy.id);
  if(tr.intro)await say(tr.intro);
  await say(tr.name+'が しょうぶを しかけてきた!');
  await say(tr.name+'は '+b.enemy.name+'を くりだした!');
  await say('いけ! '+b.ally.name+'!');
  let won=false;
  loop:while(true){
    const cmd=await battleMenu(b);
    if(cmd.type==='item'){await useItem(cmd);}
    else if(cmd.type==='switch'){b.ally=cmd.mon;await say('いけ! '+b.ally.name+'!');}
    else if(cmd.type==='move'){
      const acts=orderActs([
        {att:b.ally,defGet:()=>b.enemy,mv:cmd.mv},
        {att:b.enemy,defGet:()=>b.ally,mv:pickAI(b.enemy,b.ally)}]);
      for(const act of acts){
        await performAct(b,act);
        const r=await checkFaintsTrainer(b);
        if(r==='win'){won=true;break loop;}
        if(r==='lose')break loop;
        if(r==='next')break;
      }
      await poisonTick(b.ally);await poisonTick(b.enemy);
      const r2=await checkFaintsTrainer(b);
      if(r2==='win'){won=true;break loop;}
      if(r2==='lose')break loop;
      continue;
    }
    if(b.enemy.hp>0){
      await performAct(b,{att:b.enemy,defGet:()=>b.ally,mv:pickAI(b.enemy,b.ally)});
      const r=await checkFaintsTrainer(b);
      if(r==='win'){won=true;break loop;}
      if(r==='lose')break loop;
      await poisonTick(b.ally);await poisonTick(b.enemy);
      const r2=await checkFaintsTrainer(b);
      if(r2==='win'){won=true;break loop;}
      if(r2==='lose')break loop;
    }
  }
  endStg();
  if(won){
    if(tr.lose)await say(tr.lose);
    await say(tr.name+'との しょうぶに かった! しょうきんで '+tr.prize+'円 てに いれた!');
    G.$+=tr.prize;
    if(tr.badge){G.bg=Math.max(G.bg,tr.badge);
      await say('ジムバッジを てに いれた! (バッジ '+G.bg+'こ)');}
    if(tr.flag)G.fl[tr.flag]=true;
  }
  G.battle=null;G.mode='overworld';G.busy=false;
  return won;
}
async function checkFaintsTrainer(b){
  if(b.enemy.hp<=0){
    await say(b.trname+'の '+b.enemy.name+'は たおれた!');
    await gainExp(b.ally,b.enemy,1.5);
    b.ei++;
    if(b.ei>=b.eteam.length)return 'win';
    b.enemy=b.eteam[b.ei];seen(b.enemy.id);
    await say(b.trname+'は '+b.enemy.name+'を くりだした!');
    return 'next';
  }
  if(b.ally.hp<=0){
    await say(b.ally.name+'は たおれた!');
    const alive=G.party.filter(m=>m.hp>0);
    if(!alive.length){await blackout();return 'lose';}
    const nm=await partyChoice('つぎは だれを だす?',G.party,m=>m.hp>0,'たたかえる じょうたいじゃない!');
    b.ally=nm;await say('いけ! '+nm.name+'!');
  }
  return null;
}
</script>

<script>
/* ================= フィールド ================= */
function warpTo(map,x,y){
  G.map=map;
  const p=G.player;
  p.x=p.tx=x;p.y=p.ty=y;p.px=x*TILE;p.py=y*TILE;p.moving=false;
}
function stepDone(){
  const p=G.player,m=curMap(),key=p.x+','+p.y,t=tile(p.x,p.y);
  /* ワープ */
  if(m.warps[key]){const w=m.warps[key];warpTo(w[0],w[1],w[2]);
    G.mapSign={name:curMap().name,t0:performance.now()};
    return;}
  /* アイテム */
  if(t==='I'&&m.items[key]&&!G.fl['item_'+G.map+'_'+key]){
    G.fl['item_'+G.map+'_'+key]=true;
    const it=m.items[key];G.items[it[0]]+=it[1];
    (async()=>{G.busy=true;await say(ITEMS[it[0]].name+'を '+it[1]+'こ ひろった!');G.busy=false;})();
    return;
  }
  /* 回復 */
  if(t==='H'){
    G.party.forEach(healFull);
    (async()=>{G.busy=true;await say('ハートのゆかの ちからで モンスターたちは げんきに なった!');G.busy=false;})();
    return;
  }
  /* ストーリートリガー */
  for(const tg of TRIGGERS){
    if(tg.map!==G.map)continue;
    if(tg.flag&&G.fl[tg.flag])continue;
    if(tg.cond&&!tg.cond())continue;
    if(!tg.when(p.x,p.y))continue;
    if(tg.flag)G.fl[tg.flag]=true;
    (async()=>{await tg.run();})();
    return;
  }
  /* トレーナー視線 */
  for(const n of npcsHere()){
    if(!n.trainer||!n.sight||G.fl.df[n.id])continue;
    const d=DIRS[n.dir||'down'];
    for(let s=1;s<=n.sight;s++){
      const sx=n.x+d[0]*s,sy=n.y+d[1]*s;
      if(!WALK.includes(tile(sx,sy)))break;
      const other=npcAt(sx,sy);
      if(other)break;
      if(sx===p.x&&sy===p.y){
        (async()=>{
          G.busy=true;
          await say('!');
          await doTrainer(n);
          G.busy=false;
        })();
        return;
      }
    }
  }
  /* エンカウント */
  const enc=m.enc;
  if(enc&&(t==='G'||t==='C')&&Math.random()<enc.rate){
    const pool=[];
    enc.tbl.forEach(e=>{for(let i=0;i<e[3];i++)pool.push(e);});
    const e=pool[rand(0,pool.length-1)];
    wildBattle(e[0],rand(e[1],e[2]));
  }
}
async function doTrainer(n){
  const won=await trainerBattle(n.trainer);
  if(won)G.fl.df[n.id]=true;
  /* ジムリーダー撃破後の特別メッセージ */
  if(won&&n.id==='lead1')await say('ツタコ「グリーンバッジが あれば もりの けいびいんも とおしてくれるわ」');
  if(won&&n.id==='kagari')await say('(カガリは いんせきの かけらを もって たちさった…)');
  if(won&&n.id==='gouka'){
    await say('ゴウカ「いんせきよ! ちからを はなて!」');
    await say('…いせきが ゆれている!');
    await say('でんせつの モンスター エメロードが めざめた!!');
    await sleep(400);
    await wildBattle('EMERODO',50);
  }
  if(won&&n.id==='champ')await ending();
}
function updateWorld(dt){
  if(G.mode!=='overworld')return;
  const p=G.player;
  if(p.moving){
    p.t+=dt/(held.b?100:170);
    if(p.t>=1){p.x=p.tx;p.y=p.ty;p.px=p.x*TILE;p.py=p.y*TILE;p.moving=false;stepDone();}
    else{p.px=(p.x+(p.tx-p.x)*p.t)*TILE;p.py=(p.y+(p.ty-p.y)*p.t)*TILE;}
  }else if(!G.busy&&!G.msg&&!G.choice){
    const d=held.up?'up':held.down?'down':held.left?'left':held.right?'right':null;
    if(d){
      p.dir=d;
      const nx=p.x+DIRS[d][0],ny=p.y+DIRS[d][1];
      if(walkable(nx,ny)){p.tx=nx;p.ty=ny;p.t=0;p.moving=true;}
    }
  }
}
/* Aボタン: 調べる */
async function interact(){
  if(G.busy||G.msg||G.choice||G.mode!=='overworld')return;
  const p=G.player,d=DIRS[p.dir];
  const fx=p.x+d[0],fy=p.y+d[1];
  const t=tile(fx,fy),key=fx+','+fy,m=curMap();
  const n=npcAt(fx,fy);
  if(n){
    G.busy=true;
    if(n.trainer&&!G.fl.df[n.id]){
      await doTrainer(n);
    }else if(n.shop){
      await shopUI(n.shop);
    }else if(n.special==='bacha'){
      await bachaSalesman();
    }else{
      const lines=typeof n.lines==='function'?n.lines():n.lines;
      for(const l of (lines.length?lines:['…………']))await say(l);
    }
    G.busy=false;
    return;
  }
  if(t==='S'&&m.signs[key]){
    G.busy=true;await say(m.signs[key]);G.busy=false;return;
  }
  if(t==='A'){
    G.busy=true;
    if(G.fl.gouka&&!G.fl.emerald){
      if(await confirmAsk('さいだんが ひかっている… しらべますか?')){
        await say('エメロードが ふたたび すがたを あらわした!');
        await wildBattle('EMERODO',50);
      }
    }else if(G.fl.emerald){
      await say('さいだんは しずかに ひかっている…');
    }else{
      await say('こだいの もじが きざまれた さいだんだ。「いんせきの ちからで りゅうは めざめる」と かいてある…');
    }
    G.busy=false;
    return;
  }
}
/* ================= ショップ ================= */
async function shopUI(shopId){
  const stock=SHOPS[shopId];
  while(true){
    const labels=stock.map(s=>ITEMS[s[0]].name+'  '+s[1]+'円');
    const i=await choice(labels,{title:'かいもの (もちがね '+G.$+'円)'});
    if(i<0){await say('またの おこしを おまちしてます!');return;}
    const [key,price]=stock[i];
    const mx=Math.floor(G.$/price);
    if(mx<=0){await say('おかねが たりないようです…');continue;}
    const cnt=await choice(['1こ','5こ','10こ'].filter((_,j)=>[1,5,10][j]<=mx),{title:'いくつ かう?'});
    if(cnt<0)continue;
    const n=[1,5,10][cnt];
    G.$-=price*n;G.items[key]+=n;
    await say(ITEMS[key].name+'を '+n+'こ かった! (のこり '+G.$+'円)');
  }
}
async function bachaSalesman(){
  if(G.fl.bacha){
    await say('おじさん「バチャバチャ かわいがってるかい? しんかすると すごいんだぜ…フフフ」');
    return;
  }
  await say('おじさん「ぼうや、いいモンスター いるんだけど かわないかい? たったの 500円!」');
  if(G.$<500){await say('おじさん「おかねが たりないみたいだね。また おいで」');return;}
  if(await confirmAsk('バチャバチャを 500円で かう?')){
    G.$-=500;G.fl.bacha=true;
    const m=makeMon('BACHA',5);caught('BACHA');
    if(G.party.length<6){G.party.push(m);await say('バチャバチャを てに いれた!');}
    else{G.box.push(m);await say('バチャバチャは ボックスに おくられた!');}
    await say('おじさん「まいど! …はねるしか しないなんて いえないぜ フフフ」');
  }else{
    await say('おじさん「そうかい ざんねんだね」');
  }
}
/* ================= メニュー ================= */
async function openMenu(){
  G.busy=true;
  while(true){
    const i=await choice(['モンスター','バッグ','ずかん','ボックス','レポートをかく','せつめい','とじる'],
      {title:'メニュー  バッジ'+G.bg+'こ / '+G.$+'円'});
    if(i===0){await partyMenu();}
    else if(i===1){await bagMenu();}
    else if(i===2){await zukanMenu();}
    else if(i===3){await boxMenu();}
    else if(i===4){await saveReport();}
    else if(i===5){
      await say('くさむらや どうくつで やせいの モンスターが でるよ。よわらせて ボールで ゲット!');
      await say('ジムバッジを あつめて カザン団の やぼうを とめ リーグの チャンピオンを めざそう!');
      await say('B おしながら いどうで ダッシュ。ハートのゆかで ぜんかいふく。レポートで セーブできるよ。');
    }
    else break;
  }
  G.busy=false;
}
async function summaryView(team,idx){
  const s={team,idx,page:0};G.summary=s;
  try{
    while(true){
      const k=await waitKey(['left','right','up','down','a','b']);
      if(k==='left')s.idx=(s.idx+team.length-1)%team.length;
      else if(k==='right')s.idx=(s.idx+1)%team.length;
      else if(k==='up'||k==='down'||k==='a')s.page^=1;
      else if(k==='b')return;
    }
  }finally{G.summary=null;}
}
async function partyMenu(){
  while(true){
    const m=await partyChoice('てもちの モンスター',G.party);
    if(!m)return;
    const i=await choice(['つよさを みる','じゅんばん いれかえ','もどる'],{title:m.name});
    if(i===0){
      await summaryView(G.party,G.party.indexOf(m));
    }else if(i===1){
      const o=await partyChoice('だれと いれかえる?',G.party,x=>x!==m,'おなじ モンスターだ!');
      if(o){const a=G.party.indexOf(m),b2=G.party.indexOf(o);
        G.party[a]=o;G.party[b2]=m;
        await say('じゅんばんを いれかえた!');}
    }
  }
}
async function bagMenu(){
  while(true){
    const keys=['ball','potion','spotion'];
    const i=await choice(keys.map(k=>ITEMS[k].name+' ×'+G.items[k]),{title:'バッグ'});
    if(i<0)return;
    const key=keys[i];
    if(key==='ball'){await say('やせいの モンスターに なげると つかまえられる!');continue;}
    if(G.items[key]<=0){await say('もう もっていない!');continue;}
    const t=await partyChoice('だれに つかう?',G.party,m=>m.hp>0&&m.hp<m.maxhp,'いまは つかえない!');
    if(t){G.items[key]--;t.hp=Math.min(t.maxhp,t.hp+ITEMS[key].heal);
      await say(t.name+'の きずが かいふくした!');}
  }

async function zukanMenu(){
  const lines=ZUKAN_ORDER.map(id=>{
    const s=SPECIES[id];
    const mark=G.ct.includes(id)?'●':G.sn.includes(id)?'▲':'?';
    return ('00'+s.no).slice(-2)+' '+mark+' '+(G.sn.includes(id)?s.name+' ('+s.type+')':'?????');
  });
  await say('ずかん: みつけた '+G.sn.length+'/31  つかまえた '+G.ct.length+'/31 (●=ゲット ▲=はっけん)');
  let page=0;
  while(true){
    const slice=lines.slice(page*8,page*8+8).concat(page<3?['▼ つぎのページ']:['▲ さいしょに もどる']);
    const i=await choice(slice,{title:'モンスターずかん '+(page+1)+'/4'});
    if(i<0)return;
    if(i===slice.length-1){page=(page+1)%4;continue;}
  }
}
async function boxMenu(){
  if(!G.box.length){await say('ボックスは からっぽだ。');return;}
  while(true){
    const m=await partyChoice('ボックスの モンスター',G.box);
    if(!m)return;
    if(G.party.length>=6){
      const o=await partyChoice('てもちの だれと いれかえる?',G.party);
      if(o){
        G.box[G.box.indexOf(m)]=o;
        G.party[G.party.indexOf(o)]=m;
        await say(m.name+'と '+o.name+'を いれかえた!');
      }
    }else{
      G.box.splice(G.box.indexOf(m),1);G.party.push(m);
      await say(m.name+'を てもちに くわえた!');
      if(!G.box.length)return;
    }
  }
}
/* ================= セーブ(レポート) ================= */
function makeSaveCode(){
  const data={v:2,
    p:G.party.map(m=>[m.id,m.lv,m.exp,m.hp,m.status||0]),
    bx:G.box.map(m=>[m.id,m.lv,m.exp,m.hp,0]),
    it:[G.items.ball,G.items.potion,G.items.spotion],
    $:G.$,bg:G.bg,fl:G.fl,mp:G.map,x:G.player.x,y:G.player.y,
    ct:G.ct,sn:G.sn};
  return 'MM2.'+btoa(unescape(encodeURIComponent(JSON.stringify(data))));
}
function loadSaveCode(code){
  try{
    code=code.trim();
    if(!code.startsWith('MM2.'))return false;
    const data=JSON.parse(decodeURIComponent(escape(atob(code.slice(4)))));
    if(data.v!==2||!Array.isArray(data.p)||!data.p.length)return false;
    const mk=e=>{const m=makeMon(e[0],e[1]);m.exp=e[2];m.hp=Math.max(0,Math.min(m.maxhp,e[3]));m.status=e[4]||null;return m;};
    G.party=data.p.map(mk);
    G.box=(data.bx||[]).map(mk);
    G.items={ball:data.it[0]||0,potion:data.it[1]||0,spotion:data.it[2]||0};
    G.$=data.$||0;G.bg=data.bg||0;G.fl=data.fl||{df:{}};
    if(!G.fl.df)G.fl.df={};
    G.ct=data.ct||[];G.sn=data.sn||[];
    if(!MAPS[data.mp])return false;
    warpTo(data.mp,data.x,data.y);
    return true;
  }catch(e){return false;}
}
function showOvl(title,text,note,okCb){
  const t=document.getElementById('ovlText');
  document.getElementById('ovlTitle').textContent=title;
  document.getElementById('ovlNote').textContent=note;
  t.value=text;t.readOnly=!okCb;
  document.getElementById('ovlOk').style.display=okCb?'':'none';
  document.getElementById('ovlCopy').style.display=okCb?'none':'';
  ovl.style.display='flex';
  ovl._ok=okCb;
}
document.getElementById('ovlClose').onclick=()=>{ovl.style.display='none';};
document.getElementById('ovlCopy').onclick=()=>{
  const t=document.getElementById('ovlText');
  t.select();t.setSelectionRange(0,99999);
  try{navigator.clipboard.writeText(t.value);}catch(e){document.execCommand('copy');}
  document.getElementById('ovlNote').textContent='コピーしました! メモちょうなどに はりつけて ほぞんしてね。';
};
document.getElementById('ovlOk').onclick=()=>{
  if(ovl._ok)ovl._ok(document.getElementById('ovlText').value);
};
async function saveReport(){
  showOvl('レポートをかく (セーブコード)',makeSaveCode(),
    'このコードを コピーして メモちょう等に ほぞんしてください。タイトルの「つづきから」に はりつけると さいかいできます。');
  await say('レポートを かきだした! コードを わすれずに ほぞんしてね。');
}

async function starterSelect(){
  G.mode='starter';
  const ids=['ENZO','HATTORI','MAETA'];
  let i=0;
  while(true){
    G.starterIdx=i;
    const k=await waitKey(['left','right','a']);
    if(k==='left')i=(i+2)%3;
    else if(k==='right')i=(i+1)%3;
    else{
      const s=SPECIES[ids[i]];
      if(await confirmAsk(s.name+'('+s.type+'タイプ)に きめる?'))return ids[i];
    }
  }
}

async function pagedPick(items,title){
  let page=0;
  const per=6;
  const pages=Math.ceil(items.length/per);
  while(true){
    const slice=items.slice(page*per,page*per+per).map(e=>e[1]);
    slice.push('▼ つぎのページ ('+(page+1)+'/'+pages+')');
    const i=await choice(slice,{title,cancel:false});
    if(i===slice.length-1){page=(page+1)%pages;continue;}
    return items[page*per+i][0];
  }
}
async function vsCmd(b,pn){
  const team=pn===1?b.tA:b.tB;
  const active=pn===1?b.ally:b.enemy;
  await say('--- プレイヤー'+pn+'のばん ('+active.name+') ---');
  while(true){
    const i=await gridMenu(['たたかう','こうたい','---','---'],'P'+pn+': '+active.name+'は どうする?');
    if(i===0){
      const mi=await movesMenu(active);
      if(mi>=0){
        const mv=active.moves[mi];
        if(mv.pp<=0){await say('わざの PPが のこっていない!');continue;}
        return{type:'move',mv};
      }
    }else if(i===1){
      const t=await partyChoice('だれと いれかえる?',team,m=>m!==active&&m.hp>0,'たたかえる じょうたいじゃない!');
      if(t)return{type:'switch',mon:t};
    }
  }
}
async function vsFaint(b,def){
  await say(def.name+'は たおれた!');
  const team=b.tA.includes(def)?b.tA:b.tB;
  const pn=team===b.tA?1:2;
  const alive=team.filter(m=>m.hp>0);
  if(!alive.length){
    await say('プレイヤー'+pn+'の モンスターは ぜんめつ!');
    await say('☆☆ プレイヤー'+(pn===1?2:1)+'の かち!! ☆☆');
    return true;
  }
  const nm=await partyChoice('プレイヤー'+pn+': つぎは だれ?',team,m=>m.hp>0,'たたかえる じょうたいじゃない!');
  if(team===b.tA)b.ally=nm;else b.enemy=nm;
  await say('いけ! '+nm.name+'!');
  return false;
}
async function vsBattle(tA,tB){
  G.mode='battle';G.busy=true;
  const b={kind:'vs',ally:tA[0],enemy:tB[0],tA,tB};
  G.battle=b;
  await say('たいせん スタート! おたがい 3たいの モンスターで しょうぶ!');
  outer:while(true){
    const cA=await vsCmd(b,1);
    const cB=await vsCmd(b,2);
    if(cA.type==='switch'){b.ally=cA.mon;await say('P1は '+b.ally.name+'を くりだした!');}
    if(cB.type==='switch'){b.enemy=cB.mon;await say('P2は '+b.enemy.name+'を くりだした!');}
    const acts=[];
    if(cA.type==='move')acts.push({att:b.ally,defGet:()=>b.enemy,mv:cA.mv});
    if(cB.type==='move')acts.push({att:b.enemy,defGet:()=>b.ally,mv:cB.mv});
    orderActs(acts);
    for(const act of acts){
      await performAct(b,act);
      const def=act.defGet();
      if(def.hp<=0){if(await vsFaint(b,def))break outer;}
    }
    await poisonTick(b.ally);await poisonTick(b.enemy);
    if(b.ally.hp<=0){if(await vsFaint(b,b.ally))break;}
    if(b.enemy.hp<=0){if(await vsFaint(b,b.enemy))break;}
  }
  G.battle=null;G.busy=false;
  showTitle();
}
async function vsMode(){
  G.busy=true;G.mode='vspick';G.vsPicked=[[],[]];
  const roster=['DAIENZO','HATTORISHIN','MAETAIGA','NEZURAT','PATAHAWK','BATAFU','BIRAI',
    'KOMOROS','GOROTAN','YUMELORD','GYARA','TSURUGON','HONOOKAMI','EMERODO'];
  const items=roster.map(id=>[id,SPECIES[id].name+' ('+SPECIES[id].type+')']);
  const teams=[];
  for(let p=1;p<=2;p++){
    const t=[];
    for(let k=1;k<=3;k++){
      G.vsText='プレイヤー'+p+': '+k+'たいめの モンスターを えらんでね (ぜんいん Lv50)';
      const id=await pagedPick(items,'プレイヤー'+p+'のチーム');
      t.push(makeMon(id,50));
      G.vsPicked[p-1].push(SPECIES[id].name);
    }
    teams.push(t);
  }
  await vsBattle(teams[0],teams[1]);
}
/* ================= タイトル ================= */
function inputCode(){
  return new Promise(res=>{
    ovl._cancel=()=>{ovl.style.display='none';ovl._cancel=null;res(null);};
    showOvl('つづきから (セーブコードにゅうりょく)','',
      'ほぞんしておいた セーブコードを はりつけて「けってい」を おしてね。',
      v=>{ovl.style.display='none';ovl._cancel=null;res(v);});
  });
}
document.getElementById('ovlClose').onclick=()=>{
  if(ovl._cancel){ovl._cancel();return;}
  ovl.style.display='none';
};
function showTitle(){
  G.mode='title';
  (async()=>{
    while(true){
      const i=await choice(['はじめから','つづきから','ふたりで たいせん'],{cancel:false});
      if(i===0){await newGame();return;}
      if(i===1){
        const code=await inputCode();
        if(code===null)continue;
        if(loadSaveCode(code)){
          G.mode='overworld';G.busy=true;
          G.mapSign={name:curMap().name,t0:performance.now()};
          await say('レポートを よみこんだ! ぼうけんの つづきだ!');
          G.busy=false;
          return;
        }
        G.busy=true;G.mode='title';
        await say('コードが ただしくないようだ…');
        G.busy=false;
        continue;
      }
      if(i===2){await vsMode();return;}
    }
  })();
}
/* ================= メインループ ================= */
let last=performance.now();
function loop(now){
  const dt=Math.min(50,now-last);last=now;G.time=now;
  if(G.msg&&G.msg.t!==undefined&&G.msg.n<G.msg.t.length)
    G.msg.n=Math.min(G.msg.t.length,G.msg.n+dt/24);
  updateWorld(dt);
  render();
  requestAnimationFrame(loop);
}
showTitle();
requestAnimationFrame(loop);
